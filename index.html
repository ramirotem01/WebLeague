<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCS365 | AI Tools Index & League</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #05070a; color: #e2e8f0; scroll-behavior: smooth; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.08); }
        .hero-glow { background: radial-gradient(circle at 50% -20%, #312e81, #05070a); }
        .accent-text { background: linear-gradient(90deg, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .loader { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.1); border-top: 2px solid #ffffff; border-radius: 50%; animation: spin 0.6s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .btn-gradient { background: linear-gradient(90deg, #4f46e5, #7c3aed); transition: all 0.3s ease; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
    </style>
</head>
<body class="min-h-screen hero-glow">

    <div id="badgeModal" class="modal" onclick="closeModal()">
        <div class="glass p-8 rounded-3xl max-w-lg w-full" onclick="event.stopPropagation()">
            <h3 class="text-2xl font-bold mb-2">Get Your AI Badge</h3>
            <div class="bg-black/50 p-4 rounded-xl mb-6">
                <div id="badgePreview" class="mb-4 flex justify-center"></div>
                <code id="badgeCode" class="text-[10px] text-indigo-300 break-all block p-3 bg-white/5 rounded"></code>
            </div>
            <button onclick="copyBadgeCode()" class="w-full bg-indigo-600 py-3 rounded-xl font-bold">Copy HTML Code</button>
        </div>
    </div>

    <nav class="p-6 border-b border-white/5 bg-black/20 sticky top-0 z-50 backdrop-blur-md">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center font-extrabold text-white">AI</div>
                <span class="text-xl font-extrabold tracking-tight uppercase">PCS365 <span class="text-indigo-400">Index</span></span>
            </div>
            <div class="bg-indigo-500/10 border border-indigo-500/20 px-4 py-2 rounded-full">
                <span class="text-[10px] font-bold text-indigo-300 uppercase">Weekly Votes Left: <span id="votesLeft" class="text-white">3</span></span>
            </div>
        </div>
    </nav>

    <header class="py-24 text-center px-4">
        <h1 class="text-6xl md:text-7xl font-extrabold tracking-tighter mb-6">GLOBAL <span class="accent-text">AI</span> DIRECTORY</h1>
        <p class="text-slate-400 max-w-2xl mx-auto mb-12 text-lg">Submit your tool. We use Reddit, HN & GitHub data to calculate your Real-Time Power Score.</p>
        
        <div class="max-w-2xl mx-auto glass p-2 rounded-2xl flex flex-col md:flex-row gap-2 shadow-2xl mb-6">
            <input type="url" id="urlInput" placeholder="Paste AI App URL (https://...)" 
                class="flex-1 bg-transparent p-4 outline-none text-white font-medium">
            <button onclick="analyzeWebsite()" id="mainBtn" class="btn-gradient px-10 py-4 rounded-xl font-bold flex items-center justify-center gap-3">
                <span id="btnLabel">Analyze & List</span>
                <div id="btnSpinner" class="loader hidden"></div>
            </button>
        </div>

        <div class="max-w-md mx-auto">
            <input type="text" id="searchInput" oninput="filterTable()" placeholder="Search tools..." 
                class="w-full bg-white/5 border border-white/10 p-3 rounded-xl outline-none text-sm focus:border-indigo-500">
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 pb-32">
        <div id="previewCard" class="hidden glass rounded-3xl p-8 mb-16 border-indigo-500/40">
            <div class="flex flex-col md:flex-row items-center justify-between gap-8">
                <div class="flex items-center gap-6">
                    <img id="siteIcon" src="" class="w-20 h-20 rounded-2xl bg-white/5 p-2">
                    <div class="text-left">
                        <div class="flex items-center gap-2">
                            <h2 id="siteTitle" class="text-3xl font-bold text-white"></h2>
                            <span id="sitePR" class="bg-indigo-500 text-white text-[10px] px-2 py-0.5 rounded-full font-black">SCANNING...</span>
                        </div>
                        <p id="siteDesc" class="text-slate-400 text-sm my-1"></p>
                        <div id="metricsLog" class="text-[9px] text-indigo-400 font-mono uppercase mt-2 opacity-70"></div>
                    </div>
                </div>
                <button onclick="confirmSubmission()" class="bg-white text-black px-12 py-5 rounded-2xl font-black uppercase">Confirm</button>
            </div>
        </div>

        <div class="glass rounded-3xl overflow-hidden shadow-2xl">
            <table class="w-full text-left">
                <tbody id="leaderboardBody" class="divide-y divide-white/5"></tbody>
            </table>
            <div id="loaderText" class="p-20 text-center animate-pulse">Syncing...</div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, where, getDocs, orderBy, limit, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBs8x4SVn65rzWrQJxbwxpOj2XvoNFMhBI",
            authDomain: "webleague-7b833.firebaseapp.com",
            projectId: "webleague-7b833",
            storageBucket: "webleague-7b833.firebasestorage.app",
            messagingSenderId: "689675956792",
            appId: "1:689675956792:web:eeaeecd758e49dc9506ccd"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let masterData = [];

        // --- Data Fetching Logic (CORS Friendly) ---
        async function fetchGrowthMetrics(name) {
            try {
                // Reddit search via AllOrigins
                const redditRes = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(`https://www.reddit.com/search.json?q=${name}&limit=10`)}`);
                const redditData = await redditRes.json();
                const redditJson = JSON.parse(redditData.contents);
                const redditMentions = redditJson.data?.children?.length || 0;

                // HackerNews via direct API (CORS friendly)
                const hnRes = await fetch(`https://hn.algolia.com/api/v1/search?query=${name}`);
                const hnJson = await hnRes.json();
                const hnMentions = hnJson.hits?.length || 0;

                return { redditMentions, hnMentions };
            } catch(e) { return { redditMentions: 0, hnMentions: 0 }; }
        }

        window.analyzeWebsite = async function() {
            const url = document.getElementById('urlInput').value.trim();
            const btnLabel = document.getElementById('btnLabel');
            const btnSpinner = document.getElementById('btnSpinner');

            if(!url.startsWith('http')) return alert("Enter valid URL");
            btnLabel.innerText = "Analyzing Growth...";
            btnSpinner.classList.remove('hidden');

            try {
                // 1. Scraping Basic Meta
                const metaRes = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`);
                const metaData = await metaRes.json();
                const docParsed = new DOMParser().parseFromString(metaData.contents, 'text/html');
                const title = (docParsed.querySelector('title')?.innerText || url.split('/')[2]).split('|')[0].trim();
                const desc = docParsed.querySelector('meta[name="description"]')?.content || "AI innovation listing.";

                // 2. Fetching Smart PR (Reddit/HN)
                const metrics = await fetchGrowthMetrics(title);
                
                // Logic: Base 5.0 + mentions impact (max 9.9)
                let calculatedPR = (5.0 + (metrics.redditMentions * 0.3) + (metrics.hnMentions * 0.4)).toFixed(1);
                if (calculatedPR > 9.9) calculatedPR = 9.9;

                window.tempAI = {
                    url, title, description: desc.substring(0, 100),
                    pr: calculatedPR,
                    icon: `https://www.google.com/s2/favicons?sz=128&domain=${url}`,
                    votes: 1,
                    metrics: metrics
                };

                document.getElementById('siteTitle').innerText = title;
                document.getElementById('siteDesc').innerText = desc;
                document.getElementById('sitePR').innerText = `PR ${calculatedPR}`;
                document.getElementById('metricsLog').innerText = `REDDIT: ${metrics.redditMentions} | HN: ${metrics.hnMentions}`;
                document.getElementById('siteIcon').src = window.tempAI.icon;
                document.getElementById('previewCard').classList.remove('hidden');

            } catch(e) { alert("Analysis timed out. Try again."); }
            finally { btnLabel.innerText = "Analyze & List"; btnSpinner.classList.add('hidden'); }
        };

        window.confirmSubmission = async function() {
            await addDoc(collection(db, "league_sites"), window.tempAI);
            document.getElementById('previewCard').classList.add('hidden');
            loadIndex();
        };

        window.vote = async function(id) {
            const key = `v_log_${new Date().getFullYear()}-W${Math.ceil(new Date().getDate()/7)}`;
            let log = JSON.parse(localStorage.getItem(key) || '[]');
            if(log.length >= 3) return alert("Weekly Limit reached.");
            await updateDoc(doc(db, "league_sites", id), { votes: increment(1) });
            log.push(id);
            localStorage.setItem(key, JSON.stringify(log));
            loadIndex();
        };

        window.openBadgeModal = function(title, rank) {
            const code = `<div style="padding:20px; background:#05070a; border:1px solid #4f46e5; border-radius:15px; color:white; text-align:center; font-family:sans-serif; width:220px;">
                <div style="font-size:10px; color:#818cf8; font-weight:bold; letter-spacing:2px;">RANKED #${rank}</div>
                <div style="font-size:18px; font-weight:800; margin:10px 0;">${title}</div>
                <div style="font-size:10px; opacity:0.5;">PCS365 AI INDEX</div>
            </div>`;
            document.getElementById('badgePreview').innerHTML = code;
            document.getElementById('badgeCode').innerText = code;
            document.getElementById('badgeModal').classList.add('active');
        };

        window.closeModal = () => document.getElementById('badgeModal').classList.remove('active');
        window.copyBadgeCode = () => { navigator.clipboard.writeText(document.getElementById('badgeCode').innerText); alert("Copied!"); };

        window.filterTable = function() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            renderTable(masterData.filter(s => s.title.toLowerCase().includes(term)));
        };

        window.loadIndex = async function() {
            const q = query(collection(db, "league_sites"), orderBy("votes", "desc"), limit(100));
            const snap = await getDocs(q);
            masterData = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            renderTable(masterData);
            document.getElementById('loaderText').classList.add('hidden');
            const key = `v_log_${new Date().getFullYear()}-W${Math.ceil(new Date().getDate()/7)}`;
            document.getElementById('votesLeft').innerText = 3 - JSON.parse(localStorage.getItem(key) || '[]').length;
        };

        function renderTable(data) {
            const tbody = document.getElementById('leaderboardBody');
            tbody.innerHTML = '';
            data.forEach((item, i) => {
                const r = i + 1;
                tbody.innerHTML += `
                    <tr class="hover:bg-white/[0.02] group transition-all">
                        <td class="p-8 font-extrabold text-2xl opacity-20 group-hover:opacity-100">${r}</td>
                        <td class="p-8">
                            <div class="flex items-center gap-4">
                                <img src="${item.icon}" class="w-12 h-12 rounded-xl bg-white/5 p-1 border border-white/10">
                                <div>
                                    <div class="flex items-center gap-2">
                                        <div class="font-bold text-white text-lg">${item.title}</div>
                                        <span class="text-[9px] font-black text-indigo-400 bg-indigo-400/10 px-2 py-0.5 rounded">PR ${item.pr || '5.0'}</span>
                                    </div>
                                    <div class="text-[10px] text-slate-500 max-w-sm truncate">${item.description}</div>
                                </div>
                            </div>
                        </td>
                        <td class="p-8 text-center">
                            <div class="text-2xl font-black text-white">${item.votes}</div>
                            <div class="text-[8px] font-bold text-slate-600 uppercase">Points</div>
                        </td>
                        <td class="p-8 text-right space-x-4">
                            <button onclick="openBadgeModal('${item.title}', ${r})" class="text-[10px] font-bold text-slate-500 hover:text-indigo-400">Badge</button>
                            <button onclick="vote('${item.id}')" class="bg-indigo-500/10 hover:bg-indigo-600 border border-indigo-500/20 text-indigo-400 hover:text-white px-6 py-2 rounded-xl text-[10px] font-black uppercase transition-all">Vote</button>
                        </td>
                    </tr>`;
            });
        }
        loadIndex();
    </script>
</body>
</html>
