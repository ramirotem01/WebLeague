<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pcs365 | Weekly AI Leaderboard</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

<style>

body{
font-family:'Plus Jakarta Sans',sans-serif;
background:#05070a;
color:#e2e8f0;
}

.glass{
background:rgba(15,23,42,.8);
backdrop-filter:blur(16px);
border:1px solid rgba(255,255,255,.08);
}

.hero-glow{
background:radial-gradient(circle at 50% -20%,#312e81,#05070a);
}

.accent-text{
background:linear-gradient(90deg,#818cf8,#c084fc);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.loader{
width:18px;
height:18px;
border:2px solid rgba(255,255,255,.1);
border-top:2px solid white;
border-radius:50%;
animation:spin .6s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0)}
100%{transform:rotate(360deg)}
}

.btn-gradient{
background:linear-gradient(90deg,#4f46e5,#7c3aed);
}

</style>
</head>

<body class="min-h-screen hero-glow">

<header class="pt-20 pb-10 text-center px-4">

<h1 class="text-6xl font-extrabold mb-6">
Global <span class="accent-text">AI Index</span>
</h1>

<div class="max-w-2xl mx-auto glass p-2 rounded-2xl flex gap-2">

<input
type="url"
id="urlInput"
placeholder="Paste AI tool URL"
class="flex-1 bg-transparent p-4 outline-none"
/>

<button
onclick="analyzeWebsite()"
id="mainBtn"
class="btn-gradient px-10 py-4 rounded-xl font-bold flex items-center gap-3">

<span id="btnLabel">Analyze</span>
<div id="btnSpinner" class="loader hidden"></div>

</button>

</div>

<div id="scanLog" class="text-xs mt-4 text-slate-500"></div>

</header>

<main class="max-w-4xl mx-auto">

<div id="previewCard" class="hidden glass p-8 rounded-3xl">

<div class="flex items-center gap-6">

<img id="siteIcon" class="w-16 h-16 rounded-xl">

<div>

<h2 id="siteTitle" class="text-2xl font-bold"></h2>

<p id="siteDesc" class="text-slate-400 text-sm"></p>

<div class="mt-2">

<span id="sitePR" class="px-3 py-1 rounded bg-indigo-600 text-sm"></span>

</div>

<div id="metricsVisual" class="flex gap-2 mt-3 text-xs"></div>

</div>

</div>

</div>

</main>

<script type="module">

import {initializeApp} from
"https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js"

import {
getFirestore,
collection,
addDoc
}
from
"https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"



const firebaseConfig={
apiKey:"AIzaSyBs8x4SVn65rzWrQJxbwxpOj2XvoNFMhBI",
authDomain:"webleague-7b833.firebaseapp.com",
projectId:"webleague-7b833"
}

const app=initializeApp(firebaseConfig)

const db=getFirestore(app)



async function robustProxyFetch(url){

const proxies=[
`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,
`https://corsproxy.io/?${encodeURIComponent(url)}`
]

for(const p of proxies){

try{

const r=await fetch(p)

const d=await r.json()

const content=d.contents||d

if(content)return content

}catch{}

}

return null
}



async function getDeepSignals(domain,url){

const log=document.getElementById("scanLog")

let signals={
hn:0,
reddit:0,
github:0,
stack:0,
wiki:0
}

let pr=1



function updatePR(){

let score=1

score+=signals.hn*.4
score+=signals.reddit*.2
score+=Math.min(3,signals.github/500)
score+=signals.stack*.3
score+=signals.wiki?1.5:0

if(url.startsWith("https"))score+=.2
if(url.includes(".ai"))score+=.3

pr=Math.min(9.9,score)

if(window.tempAI){

window.tempAI.pr=pr.toFixed(1)

window.tempAI.metrics={
reddit:signals.reddit,
hn:signals.hn,
github:signals.github
}

updatePreview(window.tempAI)

}

}



const sources=[

async()=>{

log.innerText="Scanning HackerNews..."

const r=await fetch(`https://hn.algolia.com/api/v1/search?query=${domain}`)

const d=await r.json()

signals.hn=d.hits?.length||0

updatePR()

},

async()=>{

log.innerText="Scanning Reddit..."

const raw=await robustProxyFetch(`https://www.reddit.com/search.json?q=${domain}&limit=5`)

const d=typeof raw==="string"?JSON.parse(raw):raw

signals.reddit=d?.data?.children?.length||0

updatePR()

},

async()=>{

log.innerText="Scanning GitHub..."

const r=await fetch(`https://api.github.com/search/repositories?q=${domain}`)

const d=await r.json()

signals.github=d.items?.[0]?.stargazers_count||0

updatePR()

},

async()=>{

log.innerText="Scanning StackOverflow..."

const r=await fetch(`https://api.stackexchange.com/2.3/search?order=desc&sort=activity&intitle=${domain}&site=stackoverflow`)

const d=await r.json()

signals.stack=d.items?.length||0

updatePR()

},

async()=>{

log.innerText="Scanning Wikipedia..."

const r=await fetch(`https://en.wikipedia.org/w/api.php?action=query&origin=*&format=json&list=search&srsearch=${domain}`)

const d=await r.json()

signals.wiki=d.query?.search?.length||0

updatePR()

},

async()=>{

log.innerText="Scanning Web Presence..."

await fetch(`https://api.duckduckgo.com/?q=${domain}&format=json`)

updatePR()

}

]



await Promise.allSettled(

sources.map(async s=>{

try{

await Promise.race([

s(),

new Promise((_,rej)=>setTimeout(rej,8000))

])

}catch{}

})

)

log.innerText="Authority Scan Complete"

return{
h:signals.hn,
r:signals.reddit,
g:signals.github,
pr:pr.toFixed(1)
}

}



window.analyzeWebsite=async function(){

const input=document.getElementById("urlInput")

let url=input.value.trim()

if(!url)return

if(!url.startsWith("http"))url="https://"+url



document.getElementById("btnLabel").innerText="Scanning"

document.getElementById("btnSpinner").classList.remove("hidden")



const raw=await robustProxyFetch(url)



const domain=url.split("/")[2]



let title=domain.split(".")[0]

let desc="AI tool platform"



if(raw){

const docParsed=new DOMParser().parseFromString(raw,"text/html")

title=docParsed.querySelector("title")?.innerText||title

desc=docParsed.querySelector("meta[name=description]")?.content||desc

}



window.tempAI={

url:url,

title:title,

description:desc,

icon:`https://www.google.com/s2/favicons?domain=${url}`,

pr:"1.0",

votes:1,

metrics:{}

}



updatePreview(window.tempAI)



const signalsPromise=getDeepSignals(domain,url)



signalsPromise.then(s=>{

window.tempAI.pr=s.pr

window.tempAI.metrics={

reddit:s.r,

hn:s.h,

github:s.g

}

updatePreview(window.tempAI)

})



document.getElementById("btnLabel").innerText="Analyze"

document.getElementById("btnSpinner").classList.add("hidden")

}



function updatePreview(data){

document.getElementById("previewCard").classList.remove("hidden")

document.getElementById("siteTitle").innerText=data.title

document.getElementById("siteDesc").innerText=data.description

document.getElementById("siteIcon").src=data.icon

document.getElementById("sitePR").innerText="PR "+data.pr



document.getElementById("metricsVisual").innerHTML=`

<div>Reddit ${data.metrics.reddit||0}</div>

<div>HN ${data.metrics.hn||0}</div>

<div>GitHub ${data.metrics.github||0}</div>

`

}



</script>

</body>
</html>
