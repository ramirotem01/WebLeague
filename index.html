<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCS365 | AI Tools Index & League</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #05070a; color: #e2e8f0; scroll-behavior: smooth; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.08); }
        .hero-glow { background: radial-gradient(circle at 50% -20%, #312e81, #05070a); }
        .accent-text { background: linear-gradient(90deg, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .loader {
            width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,0.2);
            border-top: 2px solid #ffffff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .btn-gradient { background: linear-gradient(90deg, #4f46e5, #7c3aed); transition: all 0.3s ease; }
        .pr-badge { background: rgba(99, 102, 241, 0.1); border: 1px solid rgba(99, 102, 241, 0.3); color: #818cf8; font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 800; }
        
        /* Modal Style */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
    </style>
</head>
<body class="min-h-screen hero-glow">

    <div id="badgeModal" class="modal" onclick="closeModal()">
        <div class="glass p-8 rounded-3xl max-w-lg w-full" onclick="event.stopPropagation()">
            <h3 class="text-2xl font-bold mb-4">Embed Your AI Badge</h3>
            <p class="text-slate-400 text-sm mb-6">Show off your rank! Copy the code below and add it to your website's HTML.</p>
            <div class="bg-black/50 p-4 rounded-xl mb-6">
                <div id="badgePreview" class="mb-4 flex justify-center">
                    </div>
                <code id="badgeCode" class="text-[10px] text-indigo-300 break-all block p-3 bg-white/5 rounded border border-white/10"></code>
            </div>
            <button onclick="copyBadgeCode()" class="w-full bg-indigo-600 py-3 rounded-xl font-bold hover:bg-indigo-500 transition-all">Copy Code</button>
        </div>
    </div>

    <nav class="p-6 border-b border-white/5 bg-black/20 sticky top-0 z-50 backdrop-blur-md">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center font-extrabold text-white shadow-lg">AI</div>
                <span class="text-xl font-extrabold tracking-tight uppercase tracking-widest">PCS365 <span class="text-indigo-400">Index</span></span>
            </div>
            <div class="bg-indigo-500/10 border border-indigo-500/20 px-4 py-2 rounded-full flex items-center gap-3">
                <span class="text-[10px] font-bold text-indigo-300 uppercase tracking-widest">Weekly Votes Left: <span id="votesLeft" class="text-white">3</span></span>
            </div>
        </div>
    </nav>

    <header class="py-20 text-center px-4">
        <h1 class="text-6xl md:text-7xl font-extrabold tracking-tighter mb-6 italic">AI <span class="accent-text">LEAGUE</span></h1>
        <p class="text-slate-400 max-w-2xl mx-auto mb-10 text-lg">The world's most transparent AI tool ranking system.</p>
        
        <div class="max-w-2xl mx-auto glass p-2 rounded-2xl flex flex-col md:flex-row gap-2 shadow-2xl mb-8">
            <input type="url" id="urlInput" placeholder="Paste AI App URL (https://...)" 
                class="flex-1 bg-transparent p-4 outline-none text-white font-medium placeholder:text-slate-600">
            <button onclick="analyzeWebsite()" id="mainBtn" class="btn-gradient px-10 py-4 rounded-xl font-bold flex items-center justify-center gap-3 transition-all">
                <span id="btnLabel">Analyze & List</span>
                <div id="btnSpinner" class="loader hidden"></div>
            </button>
        </div>

        <div class="max-w-md mx-auto relative group">
            <div class="absolute inset-y-0 left-4 flex items-center pointer-events-none opacity-40 group-focus-within:opacity-100 transition-opacity">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0z"/></svg>
            </div>
            <input type="text" id="searchInput" oninput="filterLeaderboard()" placeholder="Search tools by name or description..." 
                class="w-full bg-white/5 border border-white/10 p-3 pl-12 rounded-xl outline-none focus:border-indigo-500/50 transition-all text-sm">
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 pb-32">
        <div id="previewCard" class="hidden glass rounded-3xl p-8 mb-16 border-indigo-500/40">
            <div class="flex flex-col md:flex-row items-center justify-between gap-8 text-left">
                <div class="flex items-center gap-6">
                    <img id="siteIcon" src="" class="w-20 h-20 rounded-2xl bg-white/5 p-2 border border-white/10">
                    <div>
                        <div class="flex items-center gap-2 mb-1">
                            <span id="previewPR" class="pr-badge">PR 0.0</span>
                            <h2 id="siteTitle" class="text-3xl font-bold text-white tracking-tight"></h2>
                        </div>
                        <p id="siteDescription" class="text-slate-400 text-sm mb-2 max-w-md"></p>
                        <p id="siteUrlDisplay" class="text-slate-500 font-mono text-xs italic"></p>
                    </div>
                </div>
                <button onclick="confirmSubmission()" class="bg-white text-black hover:bg-slate-200 px-12 py-5 rounded-2xl font-black uppercase tracking-widest transition-all">Confirm</button>
            </div>
        </div>

        <div class="glass rounded-3xl overflow-hidden border border-white/5 shadow-2xl">
            <table class="w-full text-left">
                <tbody id="leaderboardBody" class="divide-y divide-white/5"></tbody>
            </table>
            <div id="loaderText" class="p-20 text-center text-slate-600 text-xs font-bold uppercase tracking-widest animate-pulse">Loading AI Index...</div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, where, getDocs, orderBy, limit, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBs8x4SVn65rzWrQJxbwxpOj2XvoNFMhBI",
            authDomain: "webleague-7b833.firebaseapp.com",
            projectId: "webleague-7b833",
            storageBucket: "webleague-7b833.firebasestorage.app",
            messagingSenderId: "689675956792",
            appId: "1:689675956792:web:eeaeecd758e49dc9506ccd"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let allSites = [];

        function calculatePR(url, desc) {
            let s = 5.0;
            if (url.includes('.ai')) s += 2.0;
            if (desc.length > 50) s += 1.0;
            return Math.min(9.9, s).toFixed(1);
        }

        window.analyzeWebsite = async function() {
            const url = document.getElementById('urlInput').value.trim();
            const btnLabel = document.getElementById('btnLabel');
            const btnSpinner = document.getElementById('btnSpinner');

            if(!url.startsWith('http')) return alert("Enter valid URL");
            btnLabel.innerText = "Analyzing...";
            btnSpinner.classList.remove('hidden');

            try {
                const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`);
                const data = await res.json();
                const docParsed = new DOMParser().parseFromString(data.contents, 'text/html');
                
                const title = docParsed.querySelector('title')?.innerText || url.split('/')[2];
                const desc = docParsed.querySelector('meta[name="description"]')?.content || "An amazing AI innovation.";
                const pr = calculatePR(url, desc);

                window.tempAI = { url, title: title.split('|')[0].trim(), description: desc.substring(0, 100), pr, icon: `https://www.google.com/s2/favicons?sz=128&domain=${url}`, votes: 1 };

                document.getElementById('siteTitle').innerText = window.tempAI.title;
                document.getElementById('siteDescription').innerText = window.tempAI.description;
                document.getElementById('previewPR').innerText = `PR ${pr}`;
                document.getElementById('siteIcon').src = window.tempAI.icon;
                document.getElementById('siteUrlDisplay').innerText = url;
                document.getElementById('previewCard').classList.remove('hidden');
            } catch(e) { alert("Analysis failed, please try again."); }
            finally { btnLabel.innerText = "Analyze & List"; btnSpinner.classList.add('hidden'); }
        };

        window.confirmSubmission = async function() {
            await addDoc(collection(db, "league_sites"), window.tempAI);
            document.getElementById('previewCard').classList.add('hidden');
            loadIndex();
        };

        window.vote = async function(id) {
            const key = `v_log_${new Date().getFullYear()}-W${Math.ceil(new Date().getDate()/7)}`;
            let log = JSON.parse(localStorage.getItem(key) || '[]');
            if(log.length >= 3) return alert("Limit: 3 votes per week.");
            await updateDoc(doc(db, "league_sites", id), { votes: increment(1) });
            log.push(id);
            localStorage.setItem(key, JSON.stringify(log));
            loadIndex();
        };

        // --- Badge Logic ---
        window.openBadgeModal = function(title, rank) {
            const modal = document.getElementById('badgeModal');
            const codeBox = document.getElementById('badgeCode');
            const preview = document.getElementById('badgePreview');
            
            const badgeHtml = `<div style="padding:15px; background:#0f172a; border:2px solid #4f46e5; border-radius:12px; color:white; font-family:sans-serif; text-align:center; width:200px;">
                <div style="font-size:10px; opacity:0.6; text-transform:uppercase;">Ranked #${rank}</div>
                <div style="font-weight:bold; font-size:16px; margin:5px 0;">${title}</div>
                <div style="font-size:9px; color:#818cf8;">PCS365 AI LEAGUE</div>
            </div>`;
            
            preview.innerHTML = badgeHtml;
            codeBox.innerText = badgeHtml;
            modal.classList.add('active');
        };

        window.closeModal = () => document.getElementById('badgeModal').classList.remove('active');
        window.copyBadgeCode = () => {
            navigator.clipboard.writeText(document.getElementById('badgeCode').innerText);
            alert("Code Copied!");
        };

        window.filterLeaderboard = function() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allSites.filter(s => s.title.toLowerCase().includes(term) || s.description.toLowerCase().includes(term));
            renderTable(filtered);
        };

        window.loadIndex = async function() {
            const q = query(collection(db, "league_sites"), orderBy("votes", "desc"), limit(100));
            const snap = await getDocs(q);
            allSites = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            renderTable(allSites);
            document.getElementById('loaderText').classList.add('hidden');
        };

        function renderTable(data) {
            const tbody = document.getElementById('leaderboardBody');
            tbody.innerHTML = '';
            data.forEach((item, i) => {
                const rank = i + 1;
                tbody.innerHTML += `
                    <tr class="hover:bg-white/[0.02] group transition-all">
                        <td class="p-8 font-black text-2xl opacity-20 group-hover:opacity-100 transition-opacity">${rank}</td>
                        <td class="p-8">
                            <div class="flex items-center gap-4">
                                <img src="${item.icon}" class="w-12 h-12 rounded-xl bg-white/5 p-1 border border-white/10">
                                <div>
                                    <div class="flex items-center gap-2">
                                        <div class="font-bold text-white text-lg">${item.title}</div>
                                        <span class="pr-badge">PR ${item.pr || '5.0'}</span>
                                    </div>
                                    <div class="text-xs text-slate-500 max-w-sm truncate">${item.description}</div>
                                </div>
                            </div>
                        </td>
                        <td class="p-8 text-center">
                            <div class="text-xl font-black text-white">${item.votes}</div>
                            <div class="text-[8px] font-bold text-slate-600 uppercase">Votes</div>
                        </td>
                        <td class="p-8 text-right space-x-2">
                            <button onclick="openBadgeModal('${item.title}', ${rank})" class="text-[10px] font-bold text-indigo-400 hover:text-white transition-colors">Badge</button>
                            <button onclick="vote('${item.id}')" class="bg-indigo-600/10 hover:bg-indigo-600 border border-indigo-500/20 text-indigo-400 hover:text-white px-6 py-2 rounded-xl text-[10px] font-black uppercase transition-all">Vote</button>
                        </td>
                    </tr>`;
            });
        }

        loadIndex();
    </script>
</body>
</html>
