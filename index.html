<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pcs365 | AI Global Index</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #05070a; color: #e2e8f0; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); }
        .hero-glow { background: radial-gradient(circle at 50% -20%, #312e81, #05070a); }
        .accent-text { background: linear-gradient(90deg, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .loader { width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.1); border-top: 2px solid #6366f1; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .progress-fill { transition: width 1s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .pulse-soft { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .4; } }
    </style>
</head>
<body class="min-h-screen hero-glow">

    <nav class="p-6 border-b border-white/5 bg-black/20 sticky top-0 z-50 backdrop-blur-md">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center font-extrabold text-white shadow-lg">AI</div>
                <span class="text-xl font-extrabold tracking-tight uppercase">pcs365</span>
            </div>
            <div class="bg-indigo-500/10 border border-indigo-500/20 px-4 py-2 rounded-full font-bold text-indigo-300 text-[10px] tracking-widest uppercase">
                Votes Left: <span id="votesLeft" class="text-white">3</span>
            </div>
        </div>
    </nav>

    <header class="pt-20 pb-12 text-center px-4">
        <h1 class="text-6xl md:text-7xl font-extrabold tracking-tighter mb-6 italic uppercase">Global <span class="accent-text">AI Index</span></h1>
        <div class="max-w-2xl mx-auto glass p-2 rounded-2xl flex flex-col md:flex-row gap-2 shadow-2xl mb-8 border-white/10">
            <input type="url" id="urlInput" placeholder="Paste AI Tool URL (e.g. perplexity.ai)" class="flex-1 bg-transparent p-4 outline-none text-white font-medium">
            <button onclick="analyzeWebsite()" id="mainBtn" class="bg-indigo-600 hover:bg-indigo-500 px-10 py-4 rounded-xl font-bold flex items-center justify-center gap-3 transition-all active:scale-95">
                <span>Analyze</span>
                <div id="btnSpinner" class="loader hidden"></div>
            </button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 pb-32">
        
        <div id="previewCard" class="hidden mb-16">
            <div class="glass rounded-[2.5rem] p-1 border-indigo-500/30">
                <div class="bg-[#0b0f1a] rounded-[2.4rem] p-8">
                    <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
                        <div class="lg:col-span-3 flex flex-col items-center lg:items-start text-center lg:text-left">
                            <img id="siteIcon" src="" class="w-24 h-24 rounded-3xl mb-6 border border-white/10 bg-black p-2 shadow-2xl">
                            <h2 id="siteTitle" class="text-3xl font-black text-white italic mb-2 truncate w-full"></h2>
                            <p id="siteDesc" class="text-slate-500 text-sm line-clamp-3 italic"></p>
                        </div>
                        
                        <div class="lg:col-span-6 border-x border-white/5 px-6">
                            <h4 class="text-[10px] font-black uppercase tracking-[0.2em] text-indigo-400 mb-6">Neural Signal Mapping</h4>
                            <div id="signalGrid" class="grid grid-cols-2 sm:grid-cols-3 gap-3">
                                </div>
                        </div>

                        <div class="lg:col-span-3 flex flex-col items-center justify-center text-center">
                            <span class="text-[10px] font-black text-slate-500 uppercase mb-2">Calculated PR</span>
                            <div id="sitePR" class="text-7xl font-black italic tracking-tighter text-white mb-6">0.0</div>
                            <div class="w-full bg-white/5 h-2 rounded-full mb-8 overflow-hidden">
                                <div id="prProgress" class="progress-fill h-full bg-gradient-to-r from-orange-500 via-indigo-500 to-purple-500" style="width: 0%"></div>
                            </div>
                            <button id="confirmBtn" onclick="confirmSubmission()" class="w-full bg-white text-black py-4 rounded-2xl font-black uppercase tracking-widest hover:bg-indigo-400 transition-colors disabled:opacity-20">Analyzing APIs...</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="glass rounded-3xl overflow-hidden shadow-2xl">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="text-[11px] uppercase tracking-widest text-slate-500 border-b border-white/5 bg-white/[0.02]">
                        <th class="p-6 font-bold">Rank</th>
                        <th class="p-6 font-bold">Platform</th>
                        <th class="p-6 font-bold">Signal Mix</th>
                        <th class="p-6 font-bold text-center">Votes</th>
                        <th class="p-6"></th>
                    </tr>
                </thead>
                <tbody id="leaderboardBody" class="divide-y divide-white/5">
                    </tbody>
            </table>
            <div id="loadingState" class="p-20 text-center text-slate-600 text-xs font-black uppercase tracking-[0.3em] animate-pulse">Syncing Database...</div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, where, getDocs, orderBy, limit, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBs8x4SVn65rzWrQJxbwxpOj2XvoNFMhBI",
            authDomain: "webleague-7b833.firebaseapp.com",
            projectId: "webleague-7b833",
            storageBucket: "webleague-7b833.firebasestorage.app",
            messagingSenderId: "689675956792",
            appId: "1:689675956792:web:eeaeecd758e49dc9506ccd"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let masterData = [];

        const SOURCES = [
            { id: 'gh', name: 'GitHub', color: 'blue' },
            { id: 'hn', name: 'HackerNews', color: 'orange' },
            { id: 'rd', name: 'Reddit', color: 'red' },
            { id: 'so', name: 'StackOverflow', color: 'yellow' },
            { id: 'npm', name: 'NPM', color: 'red' },
            { id: 'pypi', name: 'PyPI', color: 'blue' },
            { id: 'wk', name: 'Wikipedia', color: 'slate' },
            { id: 'gl', name: 'GitLab', color: 'orange' },
            { id: 'ph', name: 'ProdHunt', color: 'rose' }
        ];

        window.analyzeWebsite = async function() {
            let urlInput = document.getElementById('urlInput').value.trim();
            if(!urlInput) return;
            if(!urlInput.startsWith('http')) urlInput = 'https://' + urlInput;
            
            const domain = new URL(urlInput).hostname.replace('www.', '');
            const name = domain.split('.')[0];

            document.getElementById('previewCard').classList.remove('hidden');
            document.getElementById('btnSpinner').classList.remove('hidden');
            initSignalGrid();

            const metaRes = await fetch(`https://api.microlink.io?url=${encodeURIComponent(urlInput)}`);
            const meta = await metaRes.json();
            
            window.tempAI = { 
                url: `https://${domain}`, 
                title: meta.data?.title || domain, 
                description: meta.data?.description || "No description found.",
                icon: meta.data?.logo?.url || `https://logo.clearbit.com/${domain}`,
                votes: 1, pr: 1.0, metrics: {} 
            };
            updatePreviewUI();

            const tasks = [
                { id: 'gh', fetch: () => fetch(`https://api.github.com/search/repositories?q=${name}&sort=stars`).then(r=>r.json()).then(d=>d.items?.[0]?.stargazers_count || 0) },
                { id: 'hn', fetch: () => fetch(`https://hn.algolia.com/api/v1/search?query=${name}`).then(r=>r.json()).then(d=>d.hits?.length || 0) },
                { id: 'rd', fetch: () => fetch(`https://www.reddit.com/search.json?q=${name}&limit=10`).then(r=>r.json()).then(d=>d.data?.children?.length || 0) },
                { id: 'so', fetch: () => fetch(`https://api.stackexchange.com/2.3/search/advanced?q=${name}&site=stackoverflow`).then(r=>r.json()).then(d=>d.items?.length || 0) },
                { id: 'npm', fetch: () => fetch(`https://registry.npmjs.org/-/v1/search?text=${name}`).then(r=>r.json()).then(d=>d.total || 0) },
                { id: 'pypi', fetch: () => fetch(`https://pypi.org/pypi/${name}/json`).then(r=>r.ok ? 1 : 0) },
                { id: 'wk', fetch: () => fetch(`https://en.wikipedia.org/w/api.php?action=query&origin=*&format=json&list=search&srsearch=${name}`).then(r=>r.json()).then(d=>d.query?.search?.length || 0) },
                { id: 'gl', fetch: () => fetch(`https://gitlab.com/api/v4/projects?search=${name}`).then(r=>r.json()).then(d=>d.length || 0) },
                { id: 'ph', fetch: () => fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://www.producthunt.com/search?q='+name)}`).then(r=>r.json()).then(d=>d.contents.includes('posts') ? 1 : 0) }
            ];

            await Promise.allSettled(tasks.map(async (t) => {
                try {
                    const val = await t.fetch();
                    window.tempAI.metrics[t.id] = val;
                    markSignalComplete(t.id, val);
                    calculatePR();
                } catch(e) { markSignalComplete(t.id, 0); }
            }));

            document.getElementById('btnSpinner').classList.add('hidden');
            document.getElementById('confirmBtn').disabled = false;
            document.getElementById('confirmBtn').innerText = "Update Rank";
        };

        function initSignalGrid() {
            document.getElementById('signalGrid').innerHTML = SOURCES.map(s => `
                <div id="sig-${s.id}" class="bg-white/5 border border-white/5 p-3 rounded-xl flex flex-col gap-1">
                    <span class="text-[9px] font-bold text-slate-500 uppercase tracking-tighter">${s.name}</span>
                    <div class="flex items-center gap-2">
                        <div class="w-1.5 h-1.5 rounded-full bg-slate-700 pulse-soft"></div>
                        <span class="text-[10px] text-slate-600 font-bold italic">Scanning</span>
                    </div>
                </div>`).join('');
        }

        function markSignalComplete(id, val) {
            const s = SOURCES.find(x => x.id === id);
            const el = document.getElementById(`sig-${id}`);
            if(!el) return;
            el.className = `bg-${s.color}-500/10 border border-${s.color}-500/20 p-3 rounded-xl flex flex-col transition-all scale-105`;
            el.innerHTML = `<span class="text-${s.color}-400 text-[9px] font-bold uppercase tracking-tighter">${s.name}</span>
                            <div class="flex items-center gap-2"><div class="w-1.5 h-1.5 rounded-full bg-${s.color}-500"></div>
                            <span class="text-white text-xs font-black">${val > 999 ? (val/1000).toFixed(1)+'k' : val}</span></div>`;
            setTimeout(() => el.classList.remove('scale-105'), 200);
        }

        function calculatePR() {
            let pr = 1.0;
            const m = window.tempAI.metrics;
            if(m.gh > 0) pr += Math.min(3.0, Math.log10(m.gh + 1));
            if(m.npm > 0 || m.pypi > 0) pr += 1.5;
            if(m.so > 0) pr += Math.min(1.5, m.so * 0.1);
            if(m.wk > 0) pr += 1.0;
            pr += (m.hn || 0) * 0.3 + (m.rd || 0) * 0.1 + (m.ph || 0) * 1.0;
            window.tempAI.pr = Math.min(9.9, pr).toFixed(1);
            updatePreviewUI();
        }

        function updatePreviewUI() {
            document.getElementById('siteTitle').innerText = window.tempAI.title;
            document.getElementById('siteDesc').innerText = window.tempAI.description;
            document.getElementById('siteIcon').src = window.tempAI.icon;
            document.getElementById('sitePR').innerText = window.tempAI.pr;
            document.getElementById('prProgress').style.width = `${(window.tempAI.pr / 10) * 100}%`;
        }

        window.confirmSubmission = async function() {
            const q = query(collection(db, "league_sites"), where("url", "==", window.tempAI.url));
            const snap = await getDocs(q);
            if (!snap.empty) {
                await updateDoc(doc(db, "league_sites", snap.docs[0].id), { metrics: window.tempAI.metrics, pr: window.tempAI.pr });
            } else {
                await addDoc(collection(db, "league_sites"), window.tempAI);
            }
            document.getElementById('previewCard').classList.add('hidden');
            loadIndex();
        };

        window.vote = async function(id) {
            await updateDoc(doc(db, "league_sites", id), { votes: increment(1) });
            loadIndex();
        };

        window.loadIndex = async function() {
            const q = query(collection(db, "league_sites"), orderBy("votes", "desc"), limit(100));
            const snap = await getDocs(q);
            masterData = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            renderTable(masterData);
            document.getElementById('loadingState').classList.add('hidden');
        };

        function renderTable(data) {
            const tbody = document.getElementById('leaderboardBody');
            tbody.innerHTML = data.map((item, i) => `
                <tr class="hover:bg-white/[0.02] transition-colors group">
                    <td class="p-6 font-black text-3xl opacity-10 italic group-hover:opacity-30 transition-opacity">${i + 1}</td>
                    <td class="p-6">
                        <div class="flex items-center gap-4">
                            <img src="${item.icon}" class="w-12 h-12 rounded-2xl bg-black border border-white/10 p-2">
                            <div>
                                <div class="font-bold text-white text-lg">${item.title}</div>
                                <div class="text-[10px] text-indigo-400 font-black tracking-widest uppercase">Ranked PR ${item.pr}</div>
                            </div>
                        </div>
                    </td>
                    <td class="p-6">
                        <div class="flex flex-wrap gap-2">
                            ${Object.entries(item.metrics || {}).filter(([k,v]) => v > 0).slice(0, 5).map(([k,v]) => `
                                <span class="text-[8px] font-black px-2 py-1 rounded-lg bg-indigo-500/5 text-slate-400 border border-white/5 uppercase">${k}</span>
                            `).join('')}
                        </div>
                    </td>
                    <td class="p-6 text-center font-black text-3xl italic text-white">${item.votes}</td>
                    <td class="p-6 text-right">
                        <button onclick="vote('${item.id}')" class="bg-white/5 hover:bg-white text-slate-400 hover:text-black px-6 py-3 rounded-xl text-[10px] font-black uppercase transition-all active:scale-90 border border-white/10">Vote</button>
                    </td>
                </tr>`).join('');
        }

        loadIndex();
    </script>
</body>
</html>
