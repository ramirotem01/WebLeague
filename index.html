<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCS365 | AI Directory & Power Index</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #05070a; color: #e2e8f0; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.08); }
        .hero-glow { background: radial-gradient(circle at 50% -20%, #312e81, #05070a); }
        .accent-text { background: linear-gradient(90deg, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* White Spinner */
        .loader {
            width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,0.2);
            border-top: 2px solid #ffffff; /* לבן בוהק */
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .power-tag { background: rgba(129, 140, 248, 0.1); border: 1px solid rgba(129, 140, 248, 0.3); color: #818cf8; }
    </style>
</head>
<body class="min-h-screen hero-glow">

    <nav class="p-6 border-b border-white/5 bg-black/20 sticky top-0 z-50 backdrop-blur-md">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center font-extrabold text-white shadow-lg">AI</div>
                <span class="text-xl font-extrabold tracking-tight uppercase tracking-widest">PCS365 <span class="text-indigo-400">AI INDEX</span></span>
            </div>
            <div id="voteStatus" class="bg-white/5 border border-white/10 px-4 py-2 rounded-full text-[10px] font-bold uppercase tracking-widest text-slate-400">
                Weekly Votes Left: <span id="votesLeft" class="text-white">3</span>
            </div>
        </div>
    </nav>

    <header class="py-24 text-center px-4">
        <h1 class="text-6xl md:text-8xl font-extrabold tracking-tighter mb-6 italic">THE <span class="accent-text">POWER</span> LIST</h1>
        <p class="text-slate-400 max-w-2xl mx-auto mb-12 text-lg">AI Tools are ranked by community votes and our internal Power Score (PR) logic.</p>
        
        <div class="max-w-2xl mx-auto glass p-2 rounded-2xl flex flex-col md:flex-row gap-2 shadow-2xl">
            <input type="url" id="urlInput" placeholder="Paste AI App URL (https://...)" 
                class="flex-1 bg-transparent p-4 outline-none text-white font-medium placeholder:text-slate-600">
            <button onclick="analyzeWebsite()" id="mainBtn" class="bg-indigo-600 hover:bg-indigo-500 px-10 py-4 rounded-xl font-bold flex items-center justify-center gap-3 transition-all">
                <span id="btnLabel">Analyze Site</span>
                <div id="btnSpinner" class="loader hidden"></div>
            </button>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 pb-32">
        
        <div id="previewCard" class="hidden glass rounded-3xl p-8 mb-16 border-indigo-500/40 animate-in fade-in slide-in-from-bottom-4 duration-500">
            <div class="flex flex-col md:flex-row items-start justify-between gap-8 text-left">
                <div class="flex items-start gap-6">
                    <img id="siteIcon" src="" class="w-20 h-20 rounded-2xl bg-white/5 p-1 border border-white/10">
                    <div>
                        <div class="flex items-center gap-3 mb-1">
                            <h2 id="siteTitle" class="text-3xl font-bold text-white tracking-tight"></h2>
                            <span id="sitePR" class="power-tag px-2 py-0.5 rounded text-[10px] font-black">PR 0.0</span>
                        </div>
                        <p id="siteDescription" class="text-slate-400 text-sm mb-4 max-w-lg leading-relaxed"></p>
                        <p id="siteUrlDisplay" class="text-indigo-400 font-mono text-xs opacity-60"></p>
                    </div>
                </div>
                <button onclick="confirmSubmission()" class="bg-white text-black hover:bg-indigo-50 w-full md:w-auto px-12 py-5 rounded-2xl font-black uppercase tracking-widest shadow-xl transition-all">
                    Confirm Submission
                </button>
            </div>
        </div>

        <div class="glass rounded-3xl overflow-hidden border border-white/5 shadow-2xl">
            <table class="w-full text-left">
                <thead class="bg-white/5">
                    <tr class="text-[10px] uppercase tracking-[0.2em] text-slate-500">
                        <th class="p-6">Rank</th>
                        <th class="p-6">AI Application</th>
                        <th class="p-6 text-center">Power Score</th>
                        <th class="p-6 text-center">Community</th>
                        <th class="p-6 text-right">Action</th>
                    </tr>
                </thead>
                <tbody id="leaderboardBody" class="divide-y divide-white/5"></tbody>
            </table>
            <div id="loaderText" class="p-20 text-center text-slate-600 text-xs font-bold uppercase tracking-widest animate-pulse">Scanning PCS365 Database...</div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, where, getDocs, orderBy, limit, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBs8x4SVn65rzWrQJxbwxpOj2XvoNFMhBI",
            authDomain: "webleague-7b833.firebaseapp.com",
            projectId: "webleague-7b833",
            storageBucket: "webleague-7b833.firebasestorage.app",
            messagingSenderId: "689675956792",
            appId: "1:689675956792:web:eeaeecd758e49dc9506ccd"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- INTERNAL PR LOGIC (Simulated Power Ranking) ---
        function calculatePR(url, title, description) {
            let score = 5.0; // Base score
            if (url.includes('.ai')) score += 2.1;
            if (url.includes('.com')) score += 1.2;
            if (description.length > 50) score += 0.8;
            if (title.length > 5) score += 0.4;
            // Normalize to 1-10 range
            return Math.min(9.9, score).toFixed(1);
        }

        // --- Analysis with Description & PR ---
        window.analyzeWebsite = async function() {
            const url = document.getElementById('urlInput').value.trim();
            const btnLabel = document.getElementById('btnLabel');
            const btnSpinner = document.getElementById('btnSpinner');

            if(!url.startsWith('http')) return alert("Use full URL");

            btnLabel.innerText = "Scanning Metadata...";
            btnSpinner.classList.remove('hidden');

            try {
                const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`);
                const data = await res.json();
                const docParsed = new DOMParser().parseFromString(data.contents, 'text/html');
                
                const siteTitle = docParsed.querySelector('title')?.innerText || url.split('/')[2];
                const siteDesc = docParsed.querySelector('meta[name="description"]')?.content || 
                                 docParsed.querySelector('meta[property="og:description"]')?.content || 
                                 `Advanced AI solution discovered at ${url.split('/')[2]}. Join the revolution.`;
                
                const pr = calculatePR(url, siteTitle, siteDesc);

                window.tempAI = {
                    url: url,
                    title: siteTitle.split('|')[0].trim().substring(0, 40),
                    description: siteDesc.substring(0, 140),
                    pr: pr,
                    icon: `https://www.google.com/s2/favicons?sz=128&domain=${url}`,
                    votes: 1
                };

                document.getElementById('siteTitle').innerText = window.tempAI.title;
                document.getElementById('siteDescription').innerText = window.tempAI.description;
                document.getElementById('sitePR').innerText = `PR ${pr}`;
                document.getElementById('siteIcon').src = window.tempAI.icon;
                document.getElementById('siteUrlDisplay').innerText = url;
                document.getElementById('previewCard').classList.remove('hidden');

            } catch(e) {
                // Fallback
                window.tempAI = {
                    url: url,
                    title: url.split('/')[2],
                    description: "AI-driven application currently under analysis.",
                    pr: "4.5",
                    icon: `https://www.google.com/s2/favicons?sz=128&domain=${url}`,
                    votes: 1
                };
                document.getElementById('previewCard').classList.remove('hidden');
            } finally {
                btnLabel.innerText = "Analyze Site";
                btnSpinner.classList.add('hidden');
            }
        };

        window.confirmSubmission = async function() {
            const sitesRef = collection(db, "league_sites");
            await addDoc(sitesRef, window.tempAI);
            document.getElementById('previewCard').classList.add('hidden');
            loadIndex();
        };

        window.vote = async function(id) {
            const key = `${new Date().getFullYear()}-W${Math.ceil(new Date().getDate()/7)}`; // Simplified week key
            let log = JSON.parse(localStorage.getItem(`v_log_${key}`) || '[]');
            if(log.length >= 3) return alert("Limit: 3 votes per week.");

            await updateDoc(doc(db, "league_sites", id), { votes: increment(1) });
            log.push(id);
            localStorage.setItem(`v_log_${key}`, JSON.stringify(log));
            loadIndex();
        };

        window.loadIndex = async function() {
            const q = query(collection(db, "league_sites"), orderBy("votes", "desc"), limit(50));
            const snap = await getDocs(q);
            const tbody = document.getElementById('leaderboardBody');
            tbody.innerHTML = '';
            document.getElementById('loaderText').classList.add('hidden');

            let r = 1;
            snap.forEach(d => {
                const item = d.data();
                tbody.innerHTML += `
                    <tr class="hover:bg-white/[0.02] transition-all">
                        <td class="p-6 font-extrabold text-slate-700">${r}</td>
                        <td class="p-6">
                            <div class="flex items-center gap-4">
                                <img src="${item.icon}" class="w-10 h-10 rounded-lg bg-white/5 border border-white/10">
                                <div>
                                    <div class="font-bold text-white">${item.title}</div>
                                    <div class="text-[10px] text-slate-500 max-w-sm truncate">${item.description || ''}</div>
                                </div>
                            </div>
                        </td>
                        <td class="p-6 text-center">
                            <span class="text-indigo-400 font-black text-sm">PR ${item.pr || '5.0'}</span>
                        </td>
                        <td class="p-6 text-center">
                            <div class="text-xl font-black text-white">${item.votes}</div>
                        </td>
                        <td class="p-6 text-right">
                            <button onclick="vote('${d.id}')" class="border border-white/10 hover:bg-indigo-600 hover:border-indigo-600 px-4 py-2 rounded-lg text-[10px] font-black uppercase transition-all">Vote</button>
                        </td>
                    </tr>`;
                r++;
            });
        };

        loadIndex();
    </script>
</body>
</html>
