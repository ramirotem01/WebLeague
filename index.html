<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCS365 WebLeague | Premium Rankings</title>
    
    <meta name="description" content="Official PCS365 WebLeague. Submit apps, gain AI insights, and rank globally.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0b0f1a; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .hero-gradient { background: radial-gradient(circle at 50% -20%, #312e81, #0b0f1a); }
        .accent-gradient { background: linear-gradient(90deg, #6366f1, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* Spinner CSS */
        .spinner {
            width: 24px; height: 24px;
            border: 3px solid rgba(99, 102, 241, 0.2);
            border-top: 3px solid #6366f1;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: inline-block;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .btn-vote:disabled { opacity: 0.5; cursor: not-allowed; filter: grayscale(1); }
    </style>
</head>
<body class="hero-gradient min-h-screen">

    <nav class="p-6 flex justify-between items-center max-w-6xl mx-auto">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-indigo-600 rounded flex items-center justify-center font-black">P</div>
            <span class="text-xl font-black uppercase tracking-tighter">PCS<span class="text-indigo-500">365</span></span>
        </div>
        <div id="voteCounter" class="text-[10px] font-bold text-indigo-400 uppercase tracking-widest bg-indigo-500/10 px-4 py-2 rounded-full border border-indigo-500/20">
            Votes remaining this week: <span id="remainingVotes">3</span>
        </div>
    </nav>

    <header class="py-20 text-center px-4">
        <h1 class="text-5xl md:text-7xl font-black tracking-tighter mb-4">WEBLEAGUE <span class="accent-gradient">PRO</span></h1>
        <p class="text-slate-400 max-w-xl mx-auto mb-10 text-sm md:text-base">Submit your application to the PCS365 ecosystem. Track habits, tasks, and AI insights.</p>
        
        <div class="max-w-2xl mx-auto glass p-2 rounded-2xl flex flex-col md:flex-row gap-2">
            <input type="url" id="urlInput" placeholder="https://your-app.com" 
                class="flex-1 bg-transparent p-4 outline-none text-white">
            <button onclick="analyzeWebsite()" id="analyzeBtn" class="bg-indigo-600 hover:bg-indigo-500 px-8 py-4 rounded-xl font-bold transition-all flex items-center justify-center gap-2">
                <span id="btnText">Analyze</span>
                <span id="btnSpinner" class="spinner hidden"></span>
            </button>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 pb-20">
        <div id="resultCard" class="hidden glass rounded-3xl p-8 mb-12 border-indigo-500/30 flex flex-col md:flex-row items-center justify-between gap-6">
            <div class="flex items-center gap-6">
                <img id="siteIcon" src="" class="w-16 h-16 rounded-xl bg-white/5 p-1 border border-white/10">
                <div>
                    <h2 id="siteTitle" class="text-2xl font-bold"></h2>
                    <p id="siteUrlDisplay" class="text-indigo-400 text-xs font-mono"></p>
                </div>
            </div>
            <button onclick="confirmSubmission()" class="bg-indigo-500 hover:bg-indigo-400 px-10 py-4 rounded-xl font-black uppercase tracking-widest">Add Site</button>
        </div>

        <div class="glass rounded-3xl overflow-hidden shadow-2xl">
            <table class="w-full text-left">
                <thead class="bg-white/5">
                    <tr class="text-[10px] uppercase tracking-[0.2em] text-slate-500">
                        <th class="p-6">Rank</th>
                        <th class="p-6">App Name</th>
                        <th class="p-6 text-center">Score</th>
                        <th class="p-6 text-right">Action</th>
                    </tr>
                </thead>
                <tbody id="leaderboardBody" class="divide-y divide-white/5"></tbody>
            </table>
            <div id="tableLoader" class="p-20 text-center animate-pulse text-slate-500 uppercase text-xs font-bold tracking-widest">Syncing with PCS365...</div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, where, getDocs, orderBy, limit, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBs8x4SVn65rzWrQJxbwxpOj2XvoNFMhBI",
            authDomain: "webleague-7b833.firebaseapp.com",
            projectId: "webleague-7b833",
            storageBucket: "webleague-7b833.firebasestorage.app",
            messagingSenderId: "689675956792",
            appId: "1:689675956792:web:eeaeecd758e49dc9506ccd"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- Weekly Logic Helpers ---
        function getWeekId() {
            const d = new Date();
            const year = d.getFullYear();
            const oneJan = new Date(year, 0, 1);
            const week = Math.ceil((((d - oneJan) / 86400000) + oneJan.getDay() + 1) / 7);
            return `${year}-W${week}`;
        }

        function updateVoteDisplay() {
            const weekId = getWeekId();
            const votesUsed = JSON.parse(localStorage.getItem(`votes_${weekId}`) || '[]');
            document.getElementById('remainingVotes').innerText = 3 - votesUsed.length;
        }

        // --- Analyze Website with Spinner ---
        window.analyzeWebsite = async function() {
            const url = document.getElementById('urlInput').value.trim();
            const btnText = document.getElementById('btnText');
            const btnSpinner = document.getElementById('btnSpinner');

            if (!url.startsWith('http')) return alert("Enter valid URL");

            btnText.innerText = "Processing...";
            btnSpinner.classList.remove('hidden');

            try {
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
                const response = await fetch(proxyUrl);
                const data = await response.json();
                const docParsed = new DOMParser().parseFromString(data.contents, 'text/html');

                window.lastResult = {
                    url: url,
                    title: docParsed.querySelector('title')?.innerText || "Project",
                    icon: `https://www.google.com/s2/favicons?sz=128&domain=${url}`,
                    votes: 1
                };

                document.getElementById('siteTitle').innerText = window.lastResult.title;
                document.getElementById('siteIcon').src = window.lastResult.icon;
                document.getElementById('siteUrlDisplay').innerText = url;
                document.getElementById('resultCard').classList.remove('hidden');
            } catch (e) { alert("Analysis failed."); }
            
            btnText.innerText = "Analyze";
            btnSpinner.classList.add('hidden');
        };

        // --- Voting Logic with 3 per Week Limit ---
        window.vote = async function(id) {
            const weekId = getWeekId();
            let votesUsed = JSON.parse(localStorage.getItem(`votes_${weekId}`) || '[]');

            if (votesUsed.length >= 3) {
                alert("Weekly Limit Reached! (3 votes max per week)");
                return;
            }

            try {
                const siteRef = doc(db, "league_sites", id);
                await updateDoc(siteRef, { votes: increment(1) });
                
                votesUsed.push(id);
                localStorage.setItem(`votes_${weekId}`, JSON.stringify(votesUsed));
                
                updateVoteDisplay();
                loadLeaderboard();
            } catch (e) { console.error(e); }
        };

        window.confirmSubmission = async function() {
            const sitesRef = collection(db, "league_sites");
            await addDoc(sitesRef, window.lastResult);
            document.getElementById('resultCard').classList.add('hidden');
            loadLeaderboard();
        };

        window.loadLeaderboard = async function() {
            const q = query(collection(db, "league_sites"), orderBy("votes", "desc"), limit(50));
            const snap = await getDocs(q);
            const tbody = document.getElementById('leaderboardBody');
            tbody.innerHTML = '';
            document.getElementById('tableLoader').classList.add('hidden');

            let rank = 1;
            snap.forEach(sDoc => {
                const data = sDoc.data();
                const rankIcon = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : rank;
                tbody.innerHTML += `
                    <tr>
                        <td class="p-6 font-bold text-slate-500">${rankIcon}</td>
                        <td class="p-6">
                            <div class="flex items-center gap-4">
                                <img src="${data.icon}" class="w-8 h-8 rounded-lg bg-white/5">
                                <span class="font-bold">${data.title}</span>
                            </div>
                        </td>
                        <td class="p-6 text-center font-bold text-indigo-400">${data.votes}</td>
                        <td class="p-6 text-right">
                            <button onclick="vote('${sDoc.id}')" class="btn-vote bg-white/5 hover:bg-indigo-600 px-4 py-2 rounded-lg text-[10px] font-black uppercase transition-all">Vote</button>
                        </td>
                    </tr>`;
                rank++;
            });
        };

        updateVoteDisplay();
        loadLeaderboard();
    </script>
</body>
</html>
