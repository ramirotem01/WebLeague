<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebLeague | Join the Battle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    <style>
        .gradient-bg { background: linear-gradient(135deg, #1e3a8a 0%, #4338ca 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .animate-pop { animation: pop 0.3s ease-out; }
        @keyframes pop { 0% { transform: scale(0.9); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900">

    <nav class="p-4 bg-white shadow-sm border-b">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <span class="text-2xl font-black text-indigo-600 tracking-tighter italic">PCS365 <span class="text-slate-400 font-light">LEAGUE</span></span>
            <div id="userStats" class="text-xs font-bold text-slate-500 uppercase tracking-widest">
                Submissions: <span id="countDisplay" class="text-indigo-600">0</span>/3
            </div>
        </div>
    </nav>

    <header class="gradient-bg text-white py-16 px-4 text-center">
        <h1 class="text-5xl font-extrabold mb-4">Rank Your WebApp</h1>
        <p class="text-indigo-100 text-lg max-w-xl mx-auto opacity-80">Enter your URL to extract metadata and compete in this week's global ranking.</p>
    </header>

    <main class="max-w-3xl mx-auto -mt-10 px-4 pb-20">
        
        <div class="glass-card p-8 rounded-2xl shadow-xl border border-white mb-8">
            <div id="inputForm">
                <label class="block text-slate-500 text-xs font-bold mb-2 uppercase tracking-wide">Website Address</label>
                <div class="flex flex-col md:flex-row gap-3">
                    <input type="url" id="urlInput" placeholder="https://example.com" 
                        class="flex-1 p-4 bg-slate-100 border-none rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                    <button onclick="analyzeWebsite()" id="analyzeBtn"
                        class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 px-8 rounded-xl shadow-lg shadow-indigo-200 transition-all flex items-center justify-center gap-2">
                        <span>Analyze</span>
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M12.293 5.293a1 1 0 011.414 0l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-2.293-2.293a1 1 0 010-1.414z" clip-rule="evenodd" />
                        </svg>
                    </button>
                </div>
                <p id="statusMsg" class="text-sm mt-3 text-slate-400"></p>
            </div>

            <div id="captchaBox" class="hidden mt-6 flex flex-col items-center">
                <p class="text-red-500 font-bold mb-4 italic">Security Check: Too many attempts!</p>
                <div class="g-recaptcha" data-sitekey="YOUR_SITE_KEY"></div>
                <button onclick="resetAfterCaptcha()" class="mt-4 text-indigo-600 text-sm font-bold underline">I'm not a robot, let me try again</button>
            </div>
        </div>

        <div id="loader" class="hidden py-10 text-center">
            <div class="inline-block animate-spin w-10 h-10 border-[3px] border-indigo-600 border-t-transparent rounded-full"></div>
            <p class="mt-4 text-slate-500 font-medium">Reading Source Code...</p>
        </div>

        <div id="resultCard" class="hidden animate-pop bg-white rounded-3xl shadow-2xl overflow-hidden border border-slate-100">
            <div class="h-32 bg-slate-100 relative">
                <div class="absolute -bottom-8 left-8 p-1 bg-white rounded-2xl shadow-md">
                    <img id="siteIcon" src="" class="w-16 h-16 rounded-xl object-cover bg-slate-50">
                </div>
            </div>
            <div class="pt-12 p-8">
                <h2 id="siteTitle" class="text-2xl font-black text-slate-800"></h2>
                <p id="siteUrlDisplay" class="text-indigo-500 font-semibold mb-4 text-sm"></p>
                
                <div class="space-y-4">
                    <div>
                        <span class="text-[10px] font-black uppercase text-slate-400 tracking-widest">Description</span>
                        <p id="siteDesc" class="text-slate-600 leading-relaxed mt-1"></p>
                    </div>
                    <div>
                        <span class="text-[10px] font-black uppercase text-slate-400 tracking-widest">Keywords</span>
                        <div id="siteKeywords" class="flex flex-wrap gap-2 mt-2"></div>
                    </div>
                </div>

                <div class="mt-10 pt-6 border-t border-slate-50">
                    <button onclick="confirmSubmission()" 
                        class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-black py-5 rounded-2xl shadow-xl shadow-emerald-100 transition-all uppercase tracking-widest">
                        Submit to Weekly League
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Track submissions in LocalStorage to simulate IP limits
        let submissionCount = localStorage.getItem('subCount') || 0;
        document.getElementById('countDisplay').innerText = submissionCount;

        async function analyzeWebsite() {
            const urlInput = document.getElementById('urlInput').value.trim();
            const loader = document.getElementById('loader');
            const resultCard = document.getElementById('resultCard');
            const statusMsg = document.getElementById('statusMsg');

            // 1. Validations
            if (submissionCount >= 3) {
                document.getElementById('inputForm').classList.add('hidden');
                document.getElementById('captchaBox').classList.remove('hidden');
                return;
            }

            if (!urlInput.startsWith('http')) {
                statusMsg.innerText = "❌ Please enter a full URL (including https://)";
                statusMsg.className = "text-sm mt-3 text-red-500";
                return;
            }

            // 2. UI Reset
            loader.classList.remove('hidden');
            resultCard.classList.add('hidden');
            statusMsg.innerText = "";

            try {
                // 3. Fetching Source via Proxy (AllOrigins)
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(urlInput)}`;
                const response = await fetch(proxyUrl);
                const data = await response.json();
                
                if (!data.contents) throw new Error("No content found");

                const parser = new DOMParser();
                const doc = parser.parseFromString(data.contents, 'text/html');

                // 4. Extracting Metadata
                const title = doc.querySelector('title')?.innerText || "Unknown Project";
                const desc = doc.querySelector('meta[name="description"]')?.content || 
                             doc.querySelector('meta[property="og:description"]')?.content || 
                             "No description provided by the website.";
                const keywords = doc.querySelector('meta[name="keywords"]')?.content || "webapp, software, tools";
                
                // Favicon logic
                const favicon = `https://www.google.com/s2/favicons?sz=128&domain=${urlInput}`;

                // 5. Populate UI
                document.getElementById('siteTitle').innerText = title;
                document.getElementById('siteDesc').innerText = desc;
                document.getElementById('siteIcon').src = favicon;
                document.getElementById('siteUrlDisplay').innerText = urlInput;

                const kwContainer = document.getElementById('siteKeywords');
                kwContainer.innerHTML = '';
                keywords.split(',').slice(0, 5).forEach(kw => {
                    const chip = document.createElement('span');
                    chip.className = "px-3 py-1 bg-slate-100 text-slate-500 text-xs font-bold rounded-lg";
                    chip.innerText = kw.trim();
                    kwContainer.appendChild(chip);
                });

                loader.classList.add('hidden');
                resultCard.classList.remove('hidden');

            } catch (error) {
                loader.classList.add('hidden');
                statusMsg.innerText = "❌ Error: Could not read site. Make sure the URL is public.";
                statusMsg.className = "text-sm mt-3 text-red-500";
            }
        }

        function confirmSubmission() {
            submissionCount++;
            localStorage.setItem('subCount', submissionCount);
            document.getElementById('countDisplay').innerText = submissionCount;
            
            alert("🚀 Success! Your site is now in the League.\nNote: In a real system, this would save to a database.");
            location.reload();
        }

        function resetAfterCaptcha() {
            // This is where you'd verify the g-recaptcha response
            alert("Captcha verified (Simulation). You can now login or continue.");
            localStorage.setItem('subCount', 0);
            location.reload();
        }
    </script>
</body>
</html>
