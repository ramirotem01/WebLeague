async function getDeepSignals(domain){

let hn=0;
let reddit=0;
let github=0;

try{

const hnRes=await fetch(`https://hn.algolia.com/api/v1/search?query=${domain}`);
const hnData=await hnRes.json();
hn=hnData.hits.length;

}catch{}

try{

const rRes=await fetch(`https://www.reddit.com/search.json?q=${domain}&limit=10`);
const rData=await rRes.json();
reddit=rData.data.children.length;

}catch{}

try{

const gRes=await fetch(`https://api.github.com/search/repositories?q=${domain}`);
const gData=await gRes.json();
github=gData.items?.[0]?.stargazers_count || 0;

}catch{}

let pr=1;

pr+=hn*0.5;
pr+=reddit*0.3;
pr+=Math.log10(github+1);

pr=Math.min(9.9,pr);

return{

hn,
reddit,
github,
pr:pr.toFixed(1)

};

}



window.analyzeWebsite=async function(){

let url=document.getElementById("urlInput").value.trim();

if(!url)return;

if(!url.startsWith("http")) url="https://"+url;

const domain=url.split("/")[2].replace("www.","");

document.getElementById("btnSpinner").classList.remove("hidden");

const signals=await getDeepSignals(domain);

window.tempAI={

url,
title:domain,
description:`AI solution for ${domain}`,
icon:`https://logo.clearbit.com/${domain}`,
votes:1,
pr:signals.pr,

metrics:{
reddit:signals.reddit,
hn:signals.hn,
github:signals.github
}

};

updatePreview(window.tempAI);

document.getElementById("btnSpinner").classList.add("hidden");

};



function updatePreview(data){

siteTitle.innerText=data.title;
siteDesc.innerText=data.description;
siteIcon.src=data.icon;

sitePR.innerText="PR "+data.pr;

metricsVisual.innerHTML=`
<div>Reddit: ${data.metrics.reddit}</div>
<div>HN: ${data.metrics.hn}</div>
<div>GitHub: ${data.metrics.github}</div>
`;

previewCard.classList.remove("hidden");

}



window.confirmSubmission=async function(){

await addDoc(collection(db,"league_sites"),window.tempAI);

previewCard.classList.add("hidden");

loadIndex();

};



window.vote=async function(id){

await updateDoc(doc(db,"league_sites",id),{

votes:increment(1)

});

loadIndex();

};



window.loadIndex=async function(){

const q=query(collection(db,"league_sites"),orderBy("votes","desc"),limit(100));

const snap=await getDocs(q);

masterData=snap.docs.map(d=>({id:d.id,...d.data()}));

renderTable(masterData);

loaderText.style.display="none";

};

const rank=i+1;

<div class="flex items-center gap-3">

<img src="${item.icon}"
onerror="this.src='https://www.google.com/s2/favicons?sz=64&domain=${item.url}'"
class="w-8 h-8">

${item.title}

</div>

</td>

<td class="p-6 text-xs">

Reddit ${item.metrics?.reddit || 0}<br>
HN ${item.metrics?.hn || 0}<br>
GitHub ${item.metrics?.github || 0}

</td>

<td class="p-6 text-center font-bold">
${score}
</td>

<td class="p-6">

<button onclick="vote('${item.id}')"
class="bg-indigo-600 px-4 py-2 rounded text-xs">
Vote
</button>

</td>

</tr>

`;

});

}
