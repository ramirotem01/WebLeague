<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCS365 | AI Tools Index & League</title>
    
    <meta name="description" content="The official PCS365 AI Index. Discover, rank, and submit the world's best AI applications.">
    <meta name="keywords" content="AI Index, AI Directory, PCS365, Artificial Intelligence, AI Tools League">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #05070a; color: #e2e8f0; scroll-behavior: smooth; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.08); }
        .hero-glow { background: radial-gradient(circle at 50% -20%, #312e81, #05070a); }
        .accent-text { background: linear-gradient(90deg, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* White Spinner */
        .loader {
            width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,0.2);
            border-top: 2px solid #ffffff; /* לבן בוהק */
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .btn-gradient { background: linear-gradient(90deg, #4f46e5, #7c3aed); transition: all 0.3s ease; }
        .btn-gradient:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 8px 20px rgba(79, 70, 229, 0.3); }
        .btn-gradient:active { transform: translateY(0); }
        
        .pr-badge { background: rgba(99, 102, 241, 0.1); border: 1px solid rgba(99, 102, 241, 0.3); color: #818cf8; font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 800; }
    </style>
</head>
<body class="min-h-screen hero-glow">

    <nav class="p-6 border-b border-white/5 bg-black/20 sticky top-0 z-50 backdrop-blur-md">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center font-extrabold text-white shadow-lg shadow-indigo-500/20">AI</div>
                <span class="text-xl font-extrabold tracking-tight uppercase">PCS365 <span class="text-indigo-400">Index</span></span>
            </div>
            <div class="bg-indigo-500/10 border border-indigo-500/20 px-4 py-2 rounded-full flex items-center gap-3">
                <span class="text-[10px] font-bold text-indigo-300 uppercase tracking-widest">Weekly Votes Left: <span id="votesLeft" class="text-white text-xs">3</span></span>
            </div>
        </div>
    </nav>

    <header class="py-24 text-center px-4">
        <h1 class="text-6xl md:text-7xl font-extrabold tracking-tighter mb-6">GLOBAL <span class="accent-text">AI</span> DIRECTORY</h1>
        <p class="text-slate-400 max-w-2xl mx-auto mb-12 text-lg leading-relaxed">Submit your AI tool to the PCS365 ecosystem. Reach the top of the leaderboard and gain exposure to the AI community.</p>
        
        <div class="max-w-2xl mx-auto glass p-2 rounded-2xl flex flex-col md:flex-row gap-2 shadow-2xl">
            <input type="url" id="urlInput" placeholder="Paste AI App URL (https://...)" 
                class="flex-1 bg-transparent p-4 outline-none text-white font-medium placeholder:text-slate-600">
            <button onclick="analyzeWebsite()" id="mainBtn" class="btn-gradient px-10 py-4 rounded-xl font-bold flex items-center justify-center gap-3">
                <span id="btnLabel">Analyze & List</span>
                <div id="btnSpinner" class="loader hidden"></div>
            </button>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 pb-32">
        
        <div id="previewCard" class="hidden glass rounded-3xl p-8 mb-16 border-indigo-500/40 animate-pulse-once">
            <div class="flex flex-col md:flex-row items-center justify-between gap-8 text-left">
                <div class="flex items-center gap-6">
                    <div class="relative">
                        <img id="siteIcon" src="" class="w-20 h-20 rounded-2xl bg-white/5 p-2 border border-white/10">
                        <div class="absolute -top-2 -right-2 bg-indigo-500 text-[8px] font-black px-2 py-1 rounded-full">NEW</div>
                    </div>
                    <div class="text-left">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="text-[10px] font-bold text-indigo-400 uppercase tracking-[0.3em]">Metadata Captured</span>
                            <span id="previewPR" class="pr-badge">PR 0.0</span>
                        </div>
                        <h2 id="siteTitle" class="text-3xl font-bold text-white tracking-tight leading-tight"></h2>
                        <p id="siteDescription" class="text-slate-400 text-sm mt-1 mb-2 max-w-md"></p>
                        <p id="siteUrlDisplay" class="text-slate-500 font-mono text-xs"></p>
                    </div>
                </div>
                <button onclick="confirmSubmission()" class="bg-white text-black hover:bg-slate-200 w-full md:w-auto px-12 py-5 rounded-2xl font-black uppercase tracking-widest transition-all">
                    Confirm Listing
                </button>
            </div>
        </div>

        <div class="glass rounded-3xl overflow-hidden border border-white/5 shadow-2xl">
            <div class="p-6 border-b border-white/5 bg-white/5 flex justify-between items-center">
                <h3 class="font-bold uppercase text-[10px] tracking-[0.3em] text-slate-400">Weekly Leaderboard</h3>
                <div class="flex items-center gap-2">
                    <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>
                    <span class="text-[10px] font-bold text-emerald-400 uppercase tracking-widest">Live Updates</span>
                </div>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <tbody id="leaderboardBody" class="divide-y divide-white/5">
                    </tbody>
                </table>
            </div>
            <div id="loaderText" class="p-20 text-center text-slate-600 text-xs font-bold uppercase tracking-widest animate-pulse">
                Syncing with Database...
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, where, getDocs, orderBy, limit, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBs8x4SVn65rzWrQJxbwxpOj2XvoNFMhBI",
            authDomain: "webleague-7b833.firebaseapp.com",
            projectId: "webleague-7b833",
            storageBucket: "webleague-7b833.firebasestorage.app",
            messagingSenderId: "689675956792",
            appId: "1:689675956792:web:eeaeecd758e49dc9506ccd"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- PR Calculation Logic ---
        function calculatePR(url, title, desc) {
            let score = 5.0;
            if (url.includes('.ai')) score += 2.0;
            if (desc.length > 40) score += 1.5;
            if (url.includes('app')) score += 0.5;
            return Math.min(9.9, score).toFixed(1);
        }

        function getWeekKey() {
            const d = new Date();
            const year = d.getFullYear();
            const start = new Date(year, 0, 1);
            const week = Math.ceil((((d - start) / 86400000) + start.getDay() + 1) / 7);
            return `${year}-W${week}`;
        }

        function refreshUI() {
            const key = getWeekKey();
            const log = JSON.parse(localStorage.getItem(`v_log_${key}`) || '[]');
            document.getElementById('votesLeft').innerText = Math.max(0, 3 - log.length);
        }

        window.analyzeWebsite = async function() {
            const url = document.getElementById('urlInput').value.trim();
            const btnLabel = document.getElementById('btnLabel');
            const btnSpinner = document.getElementById('btnSpinner');

            if(!url.startsWith('http')) return alert("Enter valid URL (https://)");

            btnLabel.innerText = "Processing...";
            btnSpinner.classList.remove('hidden');

            try {
                const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`);
                const data = await res.json();
                const docParsed = new DOMParser().parseFromString(data.contents, 'text/html');
                
                const siteTitle = docParsed.querySelector('title')?.innerText || url.split('/')[2];
                const siteDesc = docParsed.querySelector('meta[name="description"]')?.content || 
                                 docParsed.querySelector('meta[property="og:description"]')?.content || 
                                 "Discover this innovative AI tool on PCS365.";
                const siteIcon = `https://www.google.com/s2/favicons?sz=128&domain=${url}`;
                const pr = calculatePR(url, siteTitle, siteDesc);

                window.tempAI = {
                    url: url,
                    title: siteTitle.split('|')[0].trim().substring(0, 50),
                    description: siteDesc.substring(0, 120),
                    pr: pr,
                    icon: siteIcon,
                    votes: 1
                };

                document.getElementById('siteTitle').innerText = window.tempAI.title;
                document.getElementById('siteDescription').innerText = window.tempAI.description;
                document.getElementById('previewPR').innerText = `PR ${pr}`;
                document.getElementById('siteIcon').src = window.tempAI.icon;
                document.getElementById('siteUrlDisplay').innerText = url;
                document.getElementById('previewCard').classList.remove('hidden');

            } catch(e) {
                const domain = url.split('/')[2];
                window.tempAI = {
                    url: url,
                    title: domain.charAt(0).toUpperCase() + domain.slice(1),
                    description: "AI application listing",
                    pr: "4.0",
                    icon: `https://www.google.com/s2/favicons?sz=128&domain=${url}`,
                    votes: 1
                };
                document.getElementById('siteTitle').innerText = window.tempAI.title;
                document.getElementById('siteDescription').innerText = window.tempAI.description;
                document.getElementById('previewPR').innerText = `PR 4.0`;
                document.getElementById('siteIcon').src = window.tempAI.icon;
                document.getElementById('siteUrlDisplay').innerText = url;
                document.getElementById('previewCard').classList.remove('hidden');
            } finally {
                btnLabel.innerText = "Analyze & List";
                btnSpinner.classList.add('hidden');
            }
        };

        window.confirmSubmission = async function() {
            const sitesRef = collection(db, "league_sites");
            const q = query(sitesRef, where("url", "==", window.tempAI.url));
            const snap = await getDocs(q);
            
            if(!snap.empty) return alert("AI Tool already listed!");

            await addDoc(sitesRef, window.tempAI);
            document.getElementById('previewCard').classList.add('hidden');
            document.getElementById('urlInput').value = '';
            loadIndex();
        };

        window.vote = async function(id) {
            const key = getWeekKey();
            let log = JSON.parse(localStorage.getItem(`v_log_${key}`) || '[]');

            if(log.length >= 3) return alert("Weekly Limit: 3 votes per week allowed.");

            try {
                await updateDoc(doc(db, "league_sites", id), { votes: increment(1) });
                log.push(id);
                localStorage.setItem(`v_log_${key}`, JSON.stringify(log));
                refreshUI();
                loadIndex();
            } catch(e) { console.error(e); }
        };

        window.loadIndex = async function() {
            const q = query(collection(db, "league_sites"), orderBy("votes", "desc"), limit(100));
            const snap = await getDocs(q);
            const tbody = document.getElementById('leaderboardBody');
            tbody.innerHTML = '';
            document.getElementById('loaderText').classList.add('hidden');

            let r = 1;
            snap.forEach(d => {
                const item = d.data();
                const rankDisplay = r === 1 ? '🥇' : r === 2 ? '🥈' : r === 3 ? '🥉' : `<span class="opacity-20">${r}</span>`;
                tbody.innerHTML += `
                    <tr class="hover:bg-white/[0.02] group transition-all">
                        <td class="p-8 font-extrabold text-2xl">${rankDisplay}</td>
                        <td class="p-8">
                            <div class="flex items-center gap-4">
                                <img src="${item.icon}" class="w-12 h-12 rounded-xl bg-white/5 border border-white/10 p-1 group-hover:scale-110 transition-transform">
                                <div>
                                    <div class="flex items-center gap-2">
                                        <div class="font-bold text-white text-lg">${item.title}</div>
                                        <span class="text-[9px] font-black text-indigo-400 opacity-60">PR ${item.pr || '5.0'}</span>
                                    </div>
                                    <div class="text-[10px] text-slate-400 max-w-sm truncate mb-1">${item.description || ''}</div>
                                    <div class="text-[9px] text-indigo-400 font-mono opacity-40">${item.url}</div>
                                </div>
                            </div>
