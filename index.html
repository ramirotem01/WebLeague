<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>pcs365 | Weekly AI Leaderboard</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

<style>

body {
font-family: 'Plus Jakarta Sans', sans-serif;
background-color:#05070a;
color:#e2e8f0;
}

.glass{
background:rgba(15,23,42,0.8);
backdrop-filter:blur(16px);
border:1px solid rgba(255,255,255,0.08);
}

.hero-glow{
background:radial-gradient(circle at 50% -20%,#312e81,#05070a);
}

.accent-text{
background:linear-gradient(90deg,#818cf8,#c084fc);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.loader{
width:18px;
height:18px;
border:2px solid rgba(255,255,255,0.1);
border-top:2px solid #fff;
border-radius:50%;
animation:spin .6s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

.btn-gradient{
background:linear-gradient(90deg,#4f46e5,#7c3aed);
}

.progress-ring{
transition:width .8s cubic-bezier(.34,1.56,.64,1);
}

</style>

</head>

<body class="min-h-screen hero-glow">

<nav class="p-6 border-b border-white/5 bg-black/20 sticky top-0">

<div class="max-w-6xl mx-auto flex justify-between items-center">

<div class="flex items-center gap-3">
<div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center font-extrabold text-white">
AI
</div>
<span class="text-xl font-extrabold uppercase">pcs365</span>
</div>

<div class="bg-indigo-500/10 border border-indigo-500/20 px-4 py-2 rounded-full text-xs font-bold text-indigo-300">
Votes Left:
<span id="votesLeft" class="text-white">3</span>
</div>

</div>
</nav>

<header class="pt-20 pb-10 text-center px-4">

<h1 class="text-6xl font-extrabold mb-6">
Global <span class="accent-text">AI Index</span>
</h1>

<p class="text-slate-400 mb-10">
Real-time neural ranking based on open API signals
</p>

<div class="max-w-2xl mx-auto glass p-2 rounded-2xl flex gap-2 mb-8">

<input id="urlInput"
placeholder="Paste AI tool URL (example: perplexity.ai)"
class="flex-1 bg-transparent p-4 outline-none">

<button onclick="analyzeWebsite()" id="mainBtn"
class="btn-gradient px-10 py-4 rounded-xl font-bold flex items-center gap-3">

Analyze

<div id="btnSpinner" class="loader hidden"></div>

</button>

</div>

<input
id="searchInput"
oninput="filterTable()"
placeholder="Search tools..."
class="bg-white/5 border border-white/10 p-3 rounded-xl w-80">

</header>

<main class="max-w-6xl mx-auto px-4 pb-32">

<div id="previewCard" class="hidden mb-12 glass p-8 rounded-3xl">

<div class="flex items-center gap-6">

<img id="siteIcon" class="w-20 h-20 rounded-xl">

<div>

<h2 id="siteTitle" class="text-3xl font-bold"></h2>

<p id="siteDesc" class="text-slate-400 text-sm"></p>

</div>

</div>

<div class="mt-6">

<div class="text-sm text-slate-400 mb-1">
PR Score
</div>

<div id="sitePR" class="text-5xl font-black">0</div>

<div class="w-full bg-white/10 h-2 rounded-full mt-2">
<div id="prProgress" class="progress-ring h-2 bg-indigo-500 rounded-full"></div>
</div>

</div>

<button id="confirmBtn"
onclick="confirmSubmission()"
disabled
class="mt-6 w-full bg-white text-black py-3 rounded-xl font-bold">
Add to Leaderboard
</button>

</div>

<div class="glass rounded-3xl overflow-hidden">

<table class="w-full">

<thead>

<tr class="text-xs text-slate-500 border-b border-white/5">

<th class="p-6">Rank</th>
<th class="p-6">Application</th>
<th class="p-6">Signals</th>
<th class="p-6 text-center">Votes</th>
<th class="p-6"></th>

</tr>

</thead>

<tbody id="leaderboardBody"></tbody>

</table>

<div id="loaderText"
class="p-20 text-center text-slate-600 text-xs">
Loading leaderboard...
</div>

</div>

</main>

<script type="module">

import {initializeApp}
from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js"

import {
getFirestore,
collection,
addDoc,
query,
getDocs,
orderBy,
limit,
doc,
updateDoc,
increment
}
from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"


const firebaseConfig={
apiKey:"AIzaSyBs8x4SVn65rzWrQJxbwxpOj2XvoNFMhBI",
authDomain:"webleague-7b833.firebaseapp.com",
projectId:"webleague-7b833"
}

const app=initializeApp(firebaseConfig)
const db=getFirestore(app)

let masterData=[]

async function fetchMetadata(url){

try{

const res=await fetch(`https://api.microlink.io?url=${url}`)
const data=await res.json()

return{
title:data.data?.title || url,
description:data.data?.description || "",
icon:data.data?.logo?.url
}

}catch{

return{
title:url,
description:"",
icon:null
}

}

}

window.analyzeWebsite=async function(){

let url=document.getElementById("urlInput").value.trim()

if(!url) return

if(!url.startsWith("http"))
url="https://"+url

const domain=new URL(url).hostname

document.getElementById("btnSpinner").classList.remove("hidden")

const meta=await fetchMetadata(url)

window.tempAI={

url,

title:meta.title,

description:meta.description,

icon:meta.icon || `https://www.google.com/s2/favicons?sz=128&domain=${domain}`,

votes:1,

pr:1,

metrics:{gh:0,rd:0,hn:0}

}

calculateSignals(domain)

updatePreview()

document.getElementById("previewCard").classList.remove("hidden")

}

async function calculateSignals(domain){

try{

const gh=await fetch(`https://api.github.com/search/repositories?q=${domain}`)
.then(r=>r.json())

window.tempAI.metrics.gh=gh.items?.[0]?.stargazers_count || 0

}catch{}

try{

const rd=await fetch(`https://www.reddit.com/search.json?q=${domain}&limit=5`)
.then(r=>r.json())

window.tempAI.metrics.rd=rd.data?.children?.length || 0

}catch{}

try{

const hn=await fetch(`https://hn.algolia.com/api/v1/search?query=${domain}`)
.then(r=>r.json())

window.tempAI.metrics.hn=hn.hits?.length || 0

}catch{}

calculatePR()

document.getElementById("confirmBtn").disabled=false
document.getElementById("btnSpinner").classList.add("hidden")

}

function calculatePR(){

let pr=1

const m=window.tempAI.metrics

pr+=Math.log10(m.gh+1)
pr+=m.rd*0.2
pr+=m.hn*0.3

window.tempAI.pr=Math.min(9.9,pr).toFixed(1)

updatePreview()

}

function updatePreview(){

document.getElementById("siteTitle").innerText=tempAI.title
document.getElementById("siteDesc").innerText=tempAI.description
document.getElementById("siteIcon").src=tempAI.icon
document.getElementById("sitePR").innerText=tempAI.pr

document.getElementById("prProgress").style.width=
(tempAI.pr/10*100)+"%"

}

window.confirmSubmission=async function(){

await addDoc(collection(db,"league_sites"),tempAI)

loadIndex()

document.getElementById("previewCard").classList.add("hidden")

}

window.vote=async function(id){

await updateDoc(doc(db,"league_sites",id),{
votes:increment(1)
})

loadIndex()

}

async function loadIndex(){

const q=query(collection(db,"league_sites"),
orderBy("votes","desc"),
limit(100))

const snap=await getDocs(q)

masterData=snap.docs.map(d=>({id:d.id,...d.data()}))

renderTable(masterData)

document.getElementById("loaderText").style.display="none"

}

function renderTable(data){

const tbody=document.getElementById("leaderboardBody")

tbody.innerHTML=data.map((item,i)=>`

<tr>

<td class="p-6">${i+1}</td>

<td class="p-6 flex items-center gap-4">

<img src="${item.icon}" class="w-10 h-10 rounded">

<div>

<div>${item.title}</div>

<div class="text-xs text-slate-500">PR ${item.pr}</div>

</div>

</td>

<td class="p-6">

gh:${item.metrics?.gh || 0}

</td>

<td class="p-6 text-center">${item.votes}</td>

<td class="p-6">

<button onclick="vote('${item.id}')"
class="bg-indigo-600 px-4 py-2 rounded">
Vote
</button>

</td>

</tr>

`).join("")

}

window.filterTable=function(){

const term=document.getElementById("searchInput").value.toLowerCase()

renderTable(masterData.filter(x=>
x.title.toLowerCase().includes(term)
))

}

loadIndex()

</script>

</body>
</html>
