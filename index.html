<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>PCS365 WebLeague | Showcase Your App & Compete</title>
    <meta name="description" content="Join the PCS365 Weekly League. Submit your web application, analyze performance insights with AI, and climb the leaderboard.">
    <meta name="keywords" content="PCS365, Habit Tracker, Task Management, AI Insights, Web League, Leaderboard">
    <meta name="author" content="PCS365">
    
    <meta property="og:title" content="PCS365 WebLeague">
    <meta property="og:description" content="The ultimate arena for web developers and habit-builders. Submit, analyze, and rank.">
    <meta property="og:type" content="website">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .hero-gradient { background: radial-gradient(circle at top right, #3730a3, #0f172a); }
        .accent-gradient { background: linear-gradient(90deg, #6366f1, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn-primary { background: linear-gradient(90deg, #4f46e5, #7c3aed); transition: all 0.3s ease; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(79, 70, 229, 0.4); }
        .medal-gold { color: #fbbf24; text-shadow: 0 0 10px rgba(251, 191, 36, 0.5); }
        .input-dark { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255,255,255,0.1); }
        .input-dark:focus { border-color: #6366f1; outline: none; box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2); }
    </style>
</head>
<body class="hero-gradient min-h-screen">

    <nav class="p-6 border-b border-white/5">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center font-bold text-white">P</div>
                <span class="text-xl font-black tracking-tighter uppercase">PCS<span class="text-indigo-500">365</span> <span class="text-[10px] font-light tracking-widest opacity-50 ml-1">LEAGUE</span></span>
            </div>
            <div class="hidden md:flex gap-8 text-sm font-medium opacity-70">
                <a href="#" class="hover:text-white transition">Insights</a>
                <a href="#" class="hover:text-white transition">Habit Analysis</a>
                <a href="#" class="hover:text-white transition">AI Docs</a>
            </div>
        </div>
    </nav>

    <header class="pt-20 pb-16 px-4 text-center">
        <h1 class="text-6xl md:text-8xl font-black tracking-tighter mb-6">
            RANK YOUR <span class="accent-gradient">DREAM</span>
        </h1>
        <p class="text-slate-400 text-lg max-w-2xl mx-auto mb-10 leading-relaxed">
            Integrated with PCS365 ecosystem. Submit your WebApp, get AI-driven performance insights, and compete in the global weekly leaderboard.
        </p>
        
        <div class="max-w-xl mx-auto glass p-2 rounded-2xl flex flex-col md:flex-row gap-2">
            <input type="url" id="urlInput" placeholder="Enter your app URL (https://...)" 
                class="flex-1 input-dark p-4 rounded-xl text-white placeholder-slate-500">
            <button onclick="analyzeWebsite()" class="btn-primary px-8 py-4 rounded-xl font-bold uppercase text-sm tracking-widest">
                Analyze & Join
            </button>
        </div>
        <p id="statusMsg" class="mt-4 text-[10px] font-bold uppercase tracking-[0.2em] text-indigo-400"></p>
    </header>

    <main class="max-w-5xl mx-auto px-4 pb-32">
        
        <div id="resultCard" class="hidden animate-pop mb-16 glass rounded-3xl overflow-hidden border-indigo-500/50">
            <div class="p-8 flex flex-col md:flex-row items-center justify-between gap-6">
                <div class="flex items-center gap-6 text-left">
                    <img id="siteIcon" src="" class="w-20 h-20 rounded-2xl bg-white/5 p-2 border border-white/10 shadow-2xl">
                    <div>
                        <h2 id="siteTitle" class="text-3xl font-bold text-white tracking-tight"></h2>
                        <p id="siteUrlDisplay" class="text-indigo-400 font-mono text-sm"></p>
                    </div>
                </div>
                <button onclick="confirmSubmission()" class="btn-primary w-full md:w-auto px-10 py-5 rounded-2xl font-black uppercase tracking-widest shadow-xl">
                    Submit Entry
                </button>
            </div>
        </div>

        <div class="glass rounded-3xl overflow-hidden border border-white/5 shadow-2xl">
            <div class="p-8 border-b border-white/5 flex justify-between items-center bg-white/5">
                <h3 class="text-2xl font-black tracking-tight uppercase italic">Weekly Rankings</h3>
                <div class="flex items-center gap-3">
                    <div class="flex items-center gap-2 px-3 py-1 bg-indigo-500/10 rounded-full border border-indigo-500/20">
                        <span class="w-2 h-2 bg-indigo-500 rounded-full animate-pulse"></span>
                        <span class="text-[10px] font-bold text-indigo-400 uppercase tracking-widest">Live Sync</span>
                    </div>
                </div>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="text-slate-500 text-[10px] uppercase tracking-widest font-bold">
                            <th class="p-8">Rank</th>
                            <th class="p-8">Application</th>
                            <th class="p-8 text-center">Engagement Score</th>
                            <th class="p-8 text-right">Action</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboardBody" class="divide-y divide-white/5">
                        </tbody>
                </table>
            </div>
            <div id="tableLoader" class="p-20 text-center text-slate-500 text-xs font-bold uppercase tracking-widest animate-pulse">
                Accessing PCS365 Database...
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, where, getDocs, orderBy, limit, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBs8x4SVn65rzWrQJxbwxpOj2XvoNFMhBI",
            authDomain: "webleague-7b833.firebaseapp.com",
            projectId: "webleague-7b833",
            storageBucket: "webleague-7b833.firebasestorage.app",
            messagingSenderId: "689675956792",
            appId: "1:689675956792:web:eeaeecd758e49dc9506ccd"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Analyze Website Logic
        window.analyzeWebsite = async function() {
            const urlInput = document.getElementById('urlInput').value.trim();
            const statusMsg = document.getElementById('statusMsg');
            
            if (!urlInput.startsWith('http')) {
                statusMsg.innerText = "Error: Use full URL (https://)";
                return;
            }

            statusMsg.innerText = "Analyzing Site Architecture...";

            try {
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(urlInput)}`;
                const response = await fetch(proxyUrl);
                const data = await response.json();
                const parser = new DOMParser();
                const docParsed = parser.parseFromString(data.contents, 'text/html');

                const title = docParsed.querySelector('title')?.innerText || "Web Project";
                const icon = `https://www.google.com/s2/favicons?sz=128&domain=${urlInput}`;

                document.getElementById('siteTitle').innerText = title;
                document.getElementById('siteIcon').src = icon;
                document.getElementById('siteUrlDisplay').innerText = urlInput;

                window.lastResult = {
                    url: urlInput,
                    title: title,
                    icon: icon,
                    votes: 1,
                    createdAt: new Date().getTime()
                };

                statusMsg.innerText = "Site Verified Successfully";
                document.getElementById('resultCard').classList.remove('hidden');
            } catch (err) {
                statusMsg.innerText = "Error Fetching Data";
            }
        };

        // Confirm & Submit
        window.confirmSubmission = async function() {
            const sitesRef = collection(db, "league_sites");
            const q = query(sitesRef, where("url", "==", window.lastResult.url));
            const snap = await getDocs(q);
            
            if (!snap.empty) {
                alert("This application is already ranked!");
                return;
            }

            await addDoc(sitesRef, window.lastResult);
            document.getElementById('resultCard').classList.add('hidden');
            loadLeaderboard();
        };

        // Load Leaderboard
        window.loadLeaderboard = async function() {
            const tableBody = document.getElementById('leaderboardBody');
            const loader = document.getElementById('tableLoader');
            
            try {
                const q = query(collection(db, "league_sites"), orderBy("votes", "desc"), limit(50));
                const querySnapshot = await getDocs(q);
                
                tableBody.innerHTML = '';
                loader.classList.add('hidden');
                let rank = 1;

                querySnapshot.forEach((siteDoc) => {
                    const data = siteDoc.data();
                    let rankBadge = rank;
                    if(rank === 1) rankBadge = '🥇';
                    if(rank === 2) rankBadge = '🥈';
                    if(rank === 3) rankBadge = '🥉';

                    const row = `
                        <tr class="hover:bg-white/5 transition-all">
                            <td class="p-8 font-black text-2xl text-slate-600">${rankBadge}</td>
                            <td class="p-8">
                                <div class="flex items-center gap-4">
                                    <img src="${data.icon}" class="w-10 h-10 rounded-lg bg-white/5 border border-white/10">
                                    <div>
                                        <div class="font-bold text-white text-lg">${data.title}</div>
                                        <div class="text-[10px] font-mono text-slate-500">${data.url}</div>
                                    </div>
                                </div>
                            </td>
                            <td class="p-8 text-center text-2xl font-bold text-indigo-400">${data.votes}</td>
                            <td class="p-8 text-right">
                                <button onclick="vote('${siteDoc.id}')" class="px-6 py-2 rounded-full border border-indigo-500/50 text-indigo-400 text-xs font-black hover:bg-indigo-500 hover:text-white transition-all uppercase">Vote</button>
                            </td>
                        </tr>
                    `;
                    tableBody.innerHTML += row;
                    rank++;
                });
            } catch (err) { console.error(err); }
        };

        window.vote = async function(id) {
            const siteRef = doc(db, "league_sites", id);
            await updateDoc(siteRef, { votes: increment(1) });
            loadLeaderboard();
        };

        loadLeaderboard();
    </script>
</body>
</html>
