<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pcs365 | Weekly AI Leaderboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #05070a; color: #e2e8f0; scroll-behavior: smooth; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.08); }
        .hero-glow { background: radial-gradient(circle at 50% -20%, #312e81, #05070a); }
        .accent-text { background: linear-gradient(90deg, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .loader { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.1); border-top: 2px solid #ffffff; border-radius: 50%; animation: spin 0.6s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .btn-gradient { background: linear-gradient(90deg, #4f46e5, #7c3aed); transition: all 0.3s ease; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
        .hero-title { padding-right: 0.15em; }
    </style>
</head>
<body class="min-h-screen hero-glow">

    <div id="badgeModal" class="modal" onclick="closeModal()">
        <div class="glass p-8 rounded-3xl max-w-lg w-full" onclick="event.stopPropagation()">
            <h3 class="text-2xl font-bold mb-2 text-white italic uppercase tracking-tighter text-center">Ranking Badge</h3>
            <div id="badgePreview" class="my-8 flex justify-center"></div>
            <code id="badgeCode" class="text-[10px] text-indigo-300 break-all block p-4 bg-black/40 border border-white/5 rounded-xl mb-6"></code>
            <button onclick="copyBadgeCode()" class="w-full bg-white text-black py-4 rounded-xl font-black uppercase tracking-widest hover:bg-indigo-400 transition-colors">Copy Embed Code</button>
        </div>
    </div>

    <nav class="p-6 border-b border-white/5 bg-black/20 sticky top-0 z-50 backdrop-blur-md">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center font-extrabold text-white shadow-lg">AI</div>
                <span class="text-xl font-extrabold tracking-tight uppercase">pcs365</span>
            </div>
            <div class="bg-indigo-500/10 border border-indigo-500/20 px-4 py-2 rounded-full font-bold text-indigo-300 text-[10px] tracking-widest">
                WEEKLY VOTES LEFT: <span id="votesLeft" class="text-white text-xs">3</span>
            </div>
        </div>
    </nav>

    <header class="pt-20 pb-10 text-center px-4">
        <h1 class="hero-title text-6xl md:text-7xl font-extrabold tracking-tighter mb-6 italic uppercase">
            Global <span class="accent-text">AI Index</span>
        </h1>
        <p class="text-slate-400 max-w-3xl mx-auto mb-10 text-lg font-medium leading-relaxed">
            Community-driven voting for the best AI tools of the week. <br>
            Analyzed via Product Hunt, GitHub, and social authority signals (PR).
        </p>
        
        <div class="max-w-2xl mx-auto glass p-2 rounded-2xl flex flex-col md:flex-row gap-2 shadow-2xl mb-4 border-white/10">
            <input type="url" id="urlInput" placeholder="Paste AI tool URL (e.g., https://perplexity.ai)" class="flex-1 bg-transparent p-4 outline-none text-white font-medium placeholder:text-slate-600">
            <button onclick="analyzeWebsite()" id="mainBtn" class="btn-gradient px-10 py-4 rounded-xl font-bold flex items-center justify-center gap-3 active:scale-95 transition-all">
                <span id="btnLabel">Analyze & List</span>
                <div id="btnSpinner" class="loader hidden"></div>
            </button>
        </div>
        <div id="scanLog" class="text-[9px] font-bold text-slate-600 uppercase tracking-[0.3em] mb-8 h-4"></div>

        <div class="max-w-md mx-auto">
            <input type="text" id="searchInput" oninput="filterTable()" placeholder="Search leaderboard..." class="w-full bg-white/5 border border-white/10 p-3 rounded-xl outline-none focus:border-indigo-500 text-sm">
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 pb-32">
        <div id="previewCard" class="hidden glass rounded-3xl p-8 mb-8 border-indigo-500/40 animate-in fade-in zoom-in duration-300">
            <div class="flex flex-col md:flex-row items-center justify-between gap-8">
                <div class="flex items-center gap-6 text-left">
                    <img id="siteIcon" src="" class="w-20 h-20 rounded-2xl bg-white/10 p-2 border border-white/10">
                    <div>
                        <div class="flex items-center gap-3 mb-2">
                            <h2 id="siteTitle" class="text-3xl font-black text-white tracking-tighter"></h2>
                            <span id="sitePR" class="px-4 py-1 rounded-full font-black text-sm"></span>
                        </div>
                        <p id="siteDesc" class="text-slate-400 text-sm mb-4 max-w-md italic"></p>
                        <div id="metricsVisual" class="flex gap-2"></div>
                    </div>
                </div>
                <button onclick="confirmSubmission()" class="bg-white text-black px-12 py-5 rounded-2xl font-black uppercase tracking-widest shadow-xl hover:bg-slate-200 transition-all">Add to Leaderboard</button>
            </div>
        </div>

        <div class="glass rounded-3xl overflow-hidden border border-white/5 shadow-2xl">
            <table class="w-full text-left">
                <thead>
                    <tr class="text-[10px] uppercase tracking-widest text-slate-500 border-b border-white/5 bg-white/[0.02]">
                        <th class="p-6">Rank</th>
                        <th class="p-6">AI Application</th>
                        <th class="p-6">Social Auth</th>
                        <th class="p-6 text-center">Score</th>
                        <th class="p-6"></th>
                    </tr>
                </thead>
                <tbody id="leaderboardBody" class="divide-y divide-white/5"></tbody>
            </table>
            <div id="loaderText" class="p-20 text-center text-slate-600 text-xs font-bold uppercase tracking-widest animate-pulse">Syncing with pcs365 Index...</div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, where, getDocs, orderBy, limit, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBs8x4SVn65rzWrQJxbwxpOj2XvoNFMhBI",
            authDomain: "webleague-7b833.firebaseapp.com",
            projectId: "webleague-7b833",
            storageBucket: "webleague-7b833.firebasestorage.app",
            messagingSenderId: "689675956792",
            appId: "1:689675956792:web:eeaeecd758e49dc9506ccd"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let masterData = [];

        async function robustProxyFetch(url) {
            const proxies = [
                `https://api.allorigins.win/get?url=${encodeURIComponent(url)}&t=${Date.now()}`,
                `https://corsproxy.io/?${encodeURIComponent(url)}`
            ];
            for (let p of proxies) {
                try {
                    const r = await fetch(p, { signal: AbortSignal.timeout(5000) });
                    const d = await r.json();
                    const content = d.contents || d;
                    if(content && content.length > 100) return content;
                } catch(e) {}
            }
            return null;
        }

        async function getDeepSignals(domain, url) {
            const log = document.getElementById('scanLog');
            log.innerText = "Analyzing Authority & Signals...";
            
            const requests = [
                fetch(`https://hn.algolia.com/api/v1/search?query=${encodeURIComponent(domain)}&hitsPerPage=3`).then(r => r.json()).catch(() => ({hits:[]})),
                robustProxyFetch(`https://www.reddit.com/search.json?q=${encodeURIComponent(domain)}&limit=3`),
                fetch(`https://api.github.com/search/repositories?q=${encodeURIComponent(domain)}&sort=stars`).then(r => r.json()).catch(() => ({items:[]})),
                fetch(`https://en.wikipedia.org/w/api.php?action=query&origin=*&format=json&list=search&srsearch=${encodeURIComponent(domain)}`).then(r => r.json()).catch(() => ({query:{search:[]}})),
                robustProxyFetch(`https://www.producthunt.com/search?q=${encodeURIComponent(domain)}`)
            ];

            const [hn, reddit, gh, wiki, phRaw] = await Promise.all(requests);

            let pr = 1.0; 
            if(wiki.query?.search?.length > 0) pr += 1.8;
            if(phRaw && phRaw.includes('producthunt.com/posts')) pr += 1.2;

            const gCount = gh.items?.[0]?.stargazers_count || 0;
            if(gCount > 10) pr += Math.min(3.0, gCount / 1000); 

            const hCount = hn.hits?.length || 0;
            let rCount = 0;
            try {
                const rData = (typeof reddit === 'string' ? JSON.parse(reddit) : reddit);
                rCount = rData?.data?.children?.length || 0;
            } catch(e) {}
            
            pr += (hCount * 0.4) + (rCount * 0.2);
            if(url.startsWith('https')) pr += 0.2;
            if(url.includes('.ai')) pr += 0.3;

            log.innerText = "Deep Scan Completed.";
            setTimeout(() => log.innerText = "", 2000);

            return { h: hCount, r: rCount, g: gCount, pr: Math.min(9.9, pr).toFixed(1) };
        }

        window.analyzeWebsite = async function() {
            const urlInput = document.getElementById('urlInput');
            let url = urlInput.value.trim();
            if(!url) return;
            if(!url.startsWith('http')) url = 'https://' + url;

            document.getElementById('btnLabel').innerText = "Scanning...";
            document.getElementById('btnSpinner').classList.remove('hidden');

            try {
                const raw = await robustProxyFetch(url);
                const domainName = url.split('/')[2].replace('www.', '').split('.')[0];
                let finalTitle = domainName.charAt(0).toUpperCase() + domainName.slice(1);
                let finalDesc = `A professional AI platform specializing in ${domainName} solutions...`;

                if (raw) {
                    const docParsed = new DOMParser().parseFromString(raw, 'text/html');
                    
                    const metaTitle = docParsed.querySelector('title')?.innerText || 
                                     docParsed.querySelector('meta[property="og:title"]')?.content || 
                                     domainName;
                    finalTitle = metaTitle.split('|')[0].split('-')[0].trim();

                    const metaDesc = docParsed.querySelector('meta[name="description"]')?.content || 
                                     docParsed.querySelector('meta[property="og:description"]')?.content || 
                                     docParsed.querySelector('meta[name="twitter:description"]')?.content ||
                                     docParsed.querySelector('h1')?.innerText ||
                                     docParsed.querySelector('p')?.innerText;

                    if(metaDesc && metaDesc.length > 10) {
                        finalDesc = metaDesc.trim().substring(0, 150).replace(/\s+/g, ' ') + "...";
                    }
                }

                const s = await getDeepSignals(domainName, url);
                
                window.tempAI = { 
                    url, title: finalTitle, description: finalDesc, pr: s.pr, 
                    icon: `https://www.google.com/s2/favicons?sz=128&domain=${url}`, 
                    votes: 1, metrics: { reddit: s.r, hn: s.h, github: s.g } 
                };

                updatePreview(window.tempAI);
            } catch (e) { alert("Analysis timed out. Please try again."); }
            finally { 
                document.getElementById('btnLabel').innerText = "Analyze & List";
                document.getElementById('btnSpinner').classList.add('hidden');
            }
        };

        function updatePreview(data) {
            document.getElementById('siteTitle').innerText = data.title;
            document.getElementById('siteDesc').innerText = data.description;
            document.getElementById('siteIcon').src = data.icon;
            document.getElementById('sitePR').innerText = `PR ${data.pr}`;
            document.getElementById('sitePR').className = `px-4 py-1 rounded-full font-black text-sm ${getPRClass(data.pr)}`;
            document.getElementById('metricsVisual').innerHTML = `
                <div class="bg-orange-500/10 text-orange-400 text-[10px] font-bold px-3 py-1 rounded-lg border border-orange-500/20">Reddit: ${data.metrics.reddit}</div>
                <div class="bg-emerald-500/10 text-emerald-400 text-[10px] font-bold px-3 py-1 rounded-lg border border-emerald-500/20">HackerN: ${data.metrics.hn}</div>
                <div class="bg-blue-500/10 text-blue-400 text-[10px] font-bold px-3 py-1 rounded-lg border border-blue-500/20">GitHub: ${data.metrics.github}</div>
            `;
            document.getElementById('previewCard').classList.remove('hidden');
        }

        function getPRClass(pr) {
            if(pr >= 8) return "bg-yellow-500/20 text-yellow-400 border border-yellow-500/40";
            if(pr >= 5) return "bg-indigo-600 text-white";
            return "bg-white/10 text-slate-400";
        }

        window.confirmSubmission = async function() {
            await addDoc(collection(db, "league_sites"), window.tempAI);
            document.getElementById('urlInput').value = '';
            document.getElementById('previewCard').classList.add('hidden');
            loadIndex();
        };

        window.vote = async function(id) {
            const key = `v_log_${new Date().getFullYear()}-W${Math.ceil(new Date().getDate()/7)}`;
            let log = JSON.parse(localStorage.getItem(key) || '[]');
            if(log.length >= 3) return alert("Weekly limit reached (3/3 votes).");
            await updateDoc(doc(db, "league_sites", id), { votes: increment(1) });
            log.push(id); localStorage.setItem(key, JSON.stringify(log));
            loadIndex();
        };

        window.openBadgeModal = function(title, rank) {
            const code = `<div style="padding:20px; background:#05070a; border:1px solid #4f46e5; border-radius:15px; color:white; text-align:center; font-family:sans-serif; width:220px;">
                <div style="font-size:10px; color:#818cf8; font-weight:bold; letter-spacing:2px;">RANKED #${rank}</div>
                <div style="font-size:18px; font-weight:800; margin:10px 0;">${title}</div>
                <div style="font-size:10px; opacity:0.5;">pcs365 AI INDEX</div>
            </div>`;
            document.getElementById('badgePreview').innerHTML = code;
            document.getElementById('badgeCode').innerText = code;
            document.getElementById('badgeModal').classList.add('active');
        };

        window.closeModal = () => document.getElementById('badgeModal').classList.remove('active');
        window.copyBadgeCode = () => { navigator.clipboard.writeText(document.getElementById('badgeCode').innerText); alert("Copied!"); };

        window.loadIndex = async function() {
            const q = query(collection(db, "league_sites"), orderBy("votes", "desc"), limit(100));
            const snap = await getDocs(q);
            masterData = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            renderTable(masterData);
            document.getElementById('loaderText').classList.add('hidden');
            const key = `v_log_${new Date().getFullYear()}-W${Math.ceil(new Date().getDate()/7)}`;
            document.getElementById('votesLeft').innerText = 3 - JSON.parse(localStorage.getItem(key) || '[]').length;
        };

        function renderTable(data) {
            const tbody = document.getElementById('leaderboardBody');
            tbody.innerHTML = '';
            data.forEach((item, i) => {
                const rank = i + 1;
                const rIcon = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : `<span class="opacity-20">${rank}</span>`;
                tbody.innerHTML += `
                    <tr>
                        <td class="p-6 font-black text-2xl">${rIcon}</td>
                        <td class="p-6">
                            <div class="flex items-center gap-4">
                                <img src="${item.icon}" class="w-12 h-12 rounded-xl bg-white/5 p-1 border border-white/5">
                                <div>
                                    <div class="flex items-center gap-2 mb-0.5">
                                        <div class="font-bold text-white text-lg tracking-tight">${item.title}</div>
                                        <span class="text-[10px] font-black ${getPRClass(item.pr)} px-2 py-0.5 rounded-md">PR ${item.pr || '1.0'}</span>
                                    </div>
                                    <div class="text-[11px] text-slate-500 truncate max-w-[200px] italic">${item.description}</div>
                                </div>
                            </div>
                        </td>
                        <td class="p-6">
                            <div class="flex flex-col gap-0.5 font-bold text-[9px] uppercase tracking-tighter whitespace-nowrap">
                                <span class="text-orange-500/80">Reddit: ${item.metrics?.reddit || 0}</span>
                                <span class="text-emerald-500/80">HackerN: ${item.metrics?.hn || 0}</span>
                                <span class="text-blue-500/80">GitHub Stars: ${item.metrics?.github || 0}</span>
                            </div>
                        </td>
                        <td class="p-6 text-center">
                            <div class="text-3xl font-black text-white tracking-tighter">${item.votes}</div>
                            <div class="text-[8px] font-bold text-slate-600 uppercase">Weekly Votes</div>
                        </td>
                        <td class="p-6 text-right">
                            <div class="flex items-center justify-end gap-[1px]">
                                <button onclick="openBadgeModal('${item.title}', ${rank})" class="bg-indigo-600/10 hover:bg-indigo-600/20 text-indigo-400 px-5 py-2.5 rounded-l-xl text-[10px] font-black uppercase transition-all border border-indigo-500/10">Badge</button>
                                <button onclick="vote('${item.id}')" class="bg-transparent hover:bg-orange-500/10 border border-orange-500 text-orange-500 px-6 py-2.5 rounded-r-xl text-[10px] font-black uppercase transition-all active:scale-95">Vote</button>
                            </div>
                        </td>
                    </tr>`;
            });
        }
        window.filterTable = () => {
            const term = document.getElementById('searchInput').value.toLowerCase();
            renderTable(masterData.filter(s => s.title.toLowerCase().includes(term)));
        };
        loadIndex();
    </script>
</body>
</html>
