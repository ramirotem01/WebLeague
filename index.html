<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pcs365 | AI Global Index</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #05070a; color: #e2e8f0; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); }
        .hero-glow { background: radial-gradient(circle at 50% -20%, #312e81, #05070a); }
        .accent-text { background: linear-gradient(90deg, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .loader { width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.1); border-top: 2px solid #6366f1; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .progress-fill { transition: width 1s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
        .btn-loading { opacity: 0.4; pointer-events: none; }
    </style>
</head>
<body class="min-h-screen hero-glow">

    <div id="badgeModal" class="modal" onclick="closeModal()">
        <div class="glass p-10 rounded-[2.5rem] max-w-lg w-full text-center border-indigo-500/30" onclick="event.stopPropagation()">
            <h3 id="modalTitle" class="text-2xl font-black mb-2 text-white italic uppercase tracking-tighter">Embed Badge</h3>
            <div id="badgePreview" class="mb-10 flex justify-center scale-125"></div>
            <div class="text-left mb-6">
                <span class="text-[9px] font-black text-indigo-400 uppercase tracking-widest block mb-2">HTML Code</span>
                <code id="badgeCode" class="text-[10px] text-indigo-200 break-all block p-4 bg-black/60 border border-white/5 rounded-xl"></code>
            </div>
            <button onclick="copyBadgeCode()" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white py-4 rounded-2xl font-black uppercase tracking-widest transition-all">Copy To Clipboard</button>
        </div>
    </div>

    <nav class="p-6 border-b border-white/5 bg-black/20 sticky top-0 z-50 backdrop-blur-md">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center font-extrabold text-white">AI</div>
                <span class="text-xl font-extrabold italic uppercase">pcs365</span>
            </div>
            <div class="bg-indigo-500/5 border border-indigo-500/10 px-5 py-2 rounded-full font-bold text-indigo-300 text-[10px] tracking-widest uppercase">
                Votes Left: <span id="votesLeft" class="text-white">3</span>
            </div>
        </div>
    </nav>

    <header class="pt-24 pb-16 text-center px-4">
        <h1 class="text-6xl md:text-8xl font-extrabold tracking-tighter mb-6 italic uppercase">Global <span class="accent-text">AI Index</span></h1>
        <div class="max-w-2xl mx-auto glass p-2 rounded-3xl flex flex-col md:flex-row gap-2 shadow-2xl mb-4">
            <input type="url" id="urlInput" placeholder="Paste AI Tool URL" class="flex-1 bg-transparent p-4 outline-none text-white font-semibold">
            <button onclick="analyzeWebsite()" id="mainBtn" class="bg-indigo-600 hover:bg-indigo-500 px-12 py-4 rounded-2xl font-black flex items-center justify-center gap-3 transition-all active:scale-95 text-sm uppercase tracking-widest">
                <span>Scan</span>
                <div id="btnSpinner" class="loader hidden"></div>
            </button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 pb-40">
        
        <div id="previewCard" class="hidden mb-20">
            <div class="glass rounded-[3rem] p-1 border-indigo-500/20 bg-gradient-to-br from-indigo-500/10 to-transparent">
                <div class="bg-[#0b0f1a]/80 rounded-[2.9rem] p-10">
                    <div class="grid grid-cols-1 lg:grid-cols-12 gap-12 text-center lg:text-left">
                        <div class="lg:col-span-3 flex flex-col items-center lg:items-start">
                            <img id="siteIcon" src="" class="w-28 h-28 rounded-[2rem] mb-6 border border-white/10 bg-black p-3 shadow-2xl">
                            <h2 id="siteTitle" class="text-3xl font-black text-white italic mb-2 tracking-tighter"></h2>
                            <p id="siteDesc" class="text-slate-500 text-sm line-clamp-3 italic font-medium"></p>
                        </div>
                        <div class="lg:col-span-6 border-x border-white/5 px-8">
                            <h4 class="text-[10px] font-black uppercase tracking-[0.3em] text-indigo-400 mb-8 italic">Neural Signal Mapping</h4>
                            <div id="signalGrid" class="grid grid-cols-2 sm:grid-cols-3 gap-4"></div>
                        </div>
                        <div class="lg:col-span-3 flex flex-col items-center justify-center">
                            <span class="text-[10px] font-black text-slate-500 uppercase mb-3">Social PR</span>
                            <div id="sitePR" class="text-8xl font-black italic text-white mb-6">0.0</div>
                            <div class="w-full bg-white/5 h-2.5 rounded-full mb-8 overflow-hidden">
                                <div id="prProgress" class="progress-fill h-full bg-indigo-500" style="width: 0%"></div>
                            </div>
                            <button id="confirmBtn" onclick="confirmSubmission()" class="w-full bg-white text-black py-5 rounded-[1.2rem] font-black uppercase tracking-widest text-xs transition-all">Analyzing...</button>
                            <div id="statusMsg" class="text-[10px] font-black uppercase tracking-widest hidden mt-4"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="tableTarget" class="glass rounded-[2.5rem] overflow-hidden shadow-2xl border border-white/5">
            <table class="w-full text-left">
                <thead>
                    <tr class="text-[11px] uppercase tracking-widest text-slate-500 border-b border-white/5 bg-white/[0.03]">
                        <th class="p-8">Rank</th>
                        <th class="p-8">Application</th>
                        <th class="p-8">Signals</th>
                        <th class="p-8 text-center">Votes</th>
                        <th class="p-8">Actions</th>
                    </tr>
                </thead>
                <tbody id="leaderboardBody" class="divide-y divide-white/5"></tbody>
            </table>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, where, getDocs, orderBy, limit, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBs8x4SVn65rzWrQJxbwxpOj2XvoNFMhBI",
            authDomain: "webleague-7b833.firebaseapp.com",
            projectId: "webleague-7b833",
            storageBucket: "webleague-7b833.firebasestorage.app",
            messagingSenderId: "689675956792",
            appId: "1:689675956792:web:eeaeecd758e49dc9506ccd"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.tempAI = null; // משתנה גלובלי לזיהוי האתר שנסרק

        const SOURCES = [
            { id: 'gh', name: 'GitHub', color: 'blue' },
            { id: 'hn', name: 'HackerNews', color: 'orange' },
            { id: 'rd', name: 'Reddit', color: 'red' },
            { id: 'so', name: 'StackOverflow', color: 'yellow' },
            { id: 'npm', name: 'NPM', color: 'red' },
            { id: 'pypi', name: 'PyPI', color: 'blue' },
            { id: 'wk', name: 'Wikipedia', color: 'slate' },
            { id: 'gl', name: 'GitLab', color: 'orange' },
            { id: 'ph', name: 'ProdHunt', color: 'rose' }
        ];

        window.analyzeWebsite = async function() {
            let urlInput = document.getElementById('urlInput').value.trim();
            if(!urlInput) return;
            if(!urlInput.startsWith('http')) urlInput = 'https://' + urlInput;
            const domain = new URL(urlInput).hostname.replace('www.', '');
            const name = domain.split('.')[0];

            document.getElementById('previewCard').classList.remove('hidden');
            document.getElementById('btnSpinner').classList.remove('hidden');
            const confirmBtn = document.getElementById('confirmBtn');
            confirmBtn.classList.add('btn-loading');
            confirmBtn.innerText = "Scanning...";

            initSignalGrid();

            try {
                const metaRes = await fetch(`https://api.microlink.io?url=${encodeURIComponent(urlInput)}`);
                const meta = await metaRes.json();
                const data = meta.data || {};

                window.tempAI = { 
                    url: `https://${domain}`, 
                    title: data.title || (name.charAt(0).toUpperCase() + name.slice(1)), 
                    description: data.description || `AI monitoring for ${domain}.`,
                    icon: data.logo?.url || data.image?.url || `https://logo.clearbit.com/${domain}`,
                    votes: 1, pr: 1.0, metrics: {} 
                };
                updatePreviewUI();

                for (const s of SOURCES) {
                    // דימוי סריקה מהירה לכל מקור
                    window.tempAI.metrics[s.id] = Math.floor(Math.random() * 50); 
                    markSignalComplete(s.id, window.tempAI.metrics[s.id]);
                }
                
                calculatePR();

                const q = query(collection(db, "league_sites"), where("url", "==", window.tempAI.url));
                const snap = await getDocs(q);
                confirmBtn.innerText = snap.empty ? "Add To Global Index" : "Sync & Update Index";
                confirmBtn.classList.remove('btn-loading');
            } catch (err) { alert("Error"); }
            finally { document.getElementById('btnSpinner').classList.add('hidden'); }
        };

        function calculatePR() {
            let score = 1.0;
            Object.values(window.tempAI.metrics).forEach(v => score += Math.log10(v + 1));
            window.tempAI.pr = Math.min(9.9, score).toFixed(1);
            updatePreviewUI();
        }

        function initSignalGrid() {
            document.getElementById('signalGrid').innerHTML = SOURCES.map(s => `
                <div id="sig-${s.id}" class="bg-white/5 border border-white/5 p-4 rounded-2xl flex flex-col gap-1">
                    <span class="text-[9px] font-bold text-slate-600 uppercase">${s.name}</span>
                    <span class="text-[10px] text-slate-700 font-bold">Scanning</span>
                </div>`).join('');
        }

        function markSignalComplete(id, val) {
            const el = document.getElementById(`sig-${id}`);
            if(el) el.innerHTML = `<span class="text-white text-[9px] font-black uppercase">${id}</span>
                                   <span class="text-white text-xs font-black">${val}</span>`;
        }

        function updatePreviewUI() {
            document.getElementById('siteTitle').innerText = window.tempAI.title;
            document.getElementById('siteDesc').innerText = window.tempAI.description;
            document.getElementById('siteIcon').src = window.tempAI.icon;
            document.getElementById('sitePR').innerText = window.tempAI.pr;
            document.getElementById('prProgress').style.width = `${(window.tempAI.pr / 10) * 100}%`;
        }

        window.confirmSubmission = async function() {
            if(!window.tempAI) return;
            const confirmBtn = document.getElementById('confirmBtn');
            confirmBtn.innerText = "Syncing...";
            try {
                const q = query(collection(db, "league_sites"), where("url", "==", window.tempAI.url));
                const snap = await getDocs(q);
                if (!snap.empty) {
                    await updateDoc(doc(db, "league_sites", snap.docs[0].id), window.tempAI);
                } else {
                    await addDoc(collection(db, "league_sites"), window.tempAI);
                }
                document.getElementById('previewCard').classList.add('hidden');
                await loadIndex();
                window.scrollTo({ top: document.getElementById('tableTarget').offsetTop - 100, behavior: 'smooth' });
            } catch (err) { console.error(err); }
        };

        window.loadIndex = async function() {
            const q = query(collection(db, "league_sites"), orderBy("votes", "desc"), limit(100));
            const snap = await getDocs(q);
            const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            renderTable(data);
        };

        function renderTable(data) {
            document.getElementById('leaderboardBody').innerHTML = data.map((item, i) => `
                <tr class="hover:bg-white/[0.02] transition-colors">
                    <td class="p-8 font-black text-4xl opacity-5 italic">${i + 1}</td>
                    <td class="p-8">
                        <div class="flex items-start gap-5">
                            <img src="${item.icon}" class="w-14 h-14 rounded-2xl bg-black border border-white/10 p-2">
                            <div class="max-w-md">
                                <div class="font-bold text-white text-xl tracking-tighter mb-1">${item.title}</div>
                                <div class="text-[10px] text-indigo-400 font-black uppercase italic mb-2">PR ${item.pr}</div>
                                <p class="text-slate-500 text-xs line-clamp-2 italic font-medium">${item.description || ""}</p>
                            </div>
                        </div>
                    </td>
                    <td class="p-8"><span class="text-[7px] font-black px-2 py-1 rounded-md bg-white/5 text-slate-500 uppercase border border-white/5">Neural</span></td>
                    <td class="p-8 text-center font-black text-4xl italic text-white">${item.votes}</td>
                    <td class="p-8">
                        <div class="flex items-center justify-end gap-3">
                            <button onclick="openShare('${item.id}', '${item.title.replace(/'/g, "\\'")}', '${item.pr}')" 
                                class="border-2 border-orange-500 text-orange-500 bg-transparent px-5 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-orange-500/10 transition-all">Embed</button>
                            <button onclick="vote('${item.id}')" 
                                class="border-2 border-white text-white bg-transparent px-7 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-white/10 transition-all">Vote</button>
                        </div>
                    </td>
                </tr>`).join('');
        }

        window.vote = async function(id) {
            await updateDoc(doc(db, "league_sites", id), { votes: increment(1) });
            loadIndex();
        };

        window.openShare = (id, title, pr) => {
            const badge = `<div style="display:inline-flex; align-items:center; background:#05070a; border:1px solid #312e81; border-radius:12px; padding:12px 20px; font-family:sans-serif; color:white;"><div style="font-weight:900; margin-right:12px;">pcs365</div><div style="font-weight:900; color:#818cf8;">PR ${pr}</div></div>`;
            document.getElementById('badgePreview').innerHTML = badge;
            document.getElementById('badgeCode').innerText = badge;
            document.getElementById('badgeModal').classList.add('active');
        };

        window.closeModal = () => document.getElementById('badgeModal').classList.remove('active');
        window.copyBadgeCode = () => { navigator.clipboard.writeText(document.getElementById('badgeCode').innerText); alert("Copied!"); };

        loadIndex();
    </script>
</body>
</html>
