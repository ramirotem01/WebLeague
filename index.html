<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCS365 | AI Tools League & Index</title>
    
    <meta name="description" content="The premier index for AI applications. Submit your AI tool, get discovered, and climb the weekly leaderboard.">
    <meta name="keywords" content="AI Directory, AI Tools, Submit AI App, AI Competition, PCS365">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #05070a; color: #e2e8f0; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); }
        .ai-glow { box-shadow: 0 0 20px rgba(99, 102, 241, 0.15); }
        .accent-text { background: linear-gradient(90deg, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* Loading Spinner */
        .loader {
            width: 20px; height: 20px;
            border: 2px solid rgba(255,255,255,0.1);
            border-top: 2px solid #818cf8;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .rank-gradient { background: linear-gradient(180deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0) 100%); }
    </style>
</head>
<body class="min-h-screen">

    <nav class="p-6 border-b border-white/5 bg-black/20">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-10 h-10 bg-gradient-to-br from-indigo-600 to-purple-600 rounded-xl flex items-center justify-center font-extrabold text-white shadow-lg">AI</div>
                <span class="text-xl font-extrabold tracking-tight uppercase">PCS365 <span class="text-indigo-400">Index</span></span>
            </div>
            <div class="bg-indigo-500/10 border border-indigo-500/20 px-4 py-1.5 rounded-full">
                <span class="text-[10px] font-bold text-indigo-300 uppercase tracking-widest">Votes Left: <span id="votesLeft">3</span></span>
            </div>
        </div>
    </nav>

    <header class="py-24 text-center px-4">
        <h1 class="text-6xl md:text-7xl font-extrabold tracking-tighter mb-4">SHOWCASE YOUR <span class="accent-text">AI</span></h1>
        <p class="text-slate-400 max-w-2xl mx-auto mb-12 text-lg">The ultimate leaderboard for AI tools and applications. Submit your project, get exposure, and reach the top of the index.</p>
        
        <div class="max-w-2xl mx-auto glass p-2 rounded-2xl flex flex-col md:flex-row gap-2 ai-glow">
            <input type="url" id="urlInput" placeholder="Enter AI Tool URL (https://...)" 
                class="flex-1 bg-transparent p-4 outline-none text-white font-medium">
            <button onclick="analyzeWebsite()" id="mainBtn" class="bg-indigo-600 hover:bg-indigo-500 px-10 py-4 rounded-xl font-bold transition-all flex items-center justify-center gap-3">
                <span id="btnLabel">Analyze & List</span>
                <div id="btnSpinner" class="loader hidden"></div>
            </button>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 pb-32">
        <div id="previewCard" class="hidden glass rounded-3xl p-8 mb-16 border-indigo-500/40 animate-in fade-in zoom-in duration-300">
            <div class="flex flex-col md:flex-row items-center justify-between gap-8">
                <div class="flex items-center gap-6">
                    <img id="siteIcon" src="" class="w-20 h-20 rounded-2xl bg-white/5 p-2 border border-white/10 shadow-2xl">
                    <div class="text-left">
                        <span class="text-[10px] font-bold text-indigo-400 uppercase tracking-widest">AI Tool Detected</span>
                        <h2 id="siteTitle" class="text-3xl font-bold text-white tracking-tight"></h2>
                        <p id="siteUrlDisplay" class="text-slate-500 font-mono text-sm"></p>
                    </div>
                </div>
                <button onclick="confirmSubmission()" class="bg-indigo-500 hover:bg-indigo-400 w-full md:w-auto px-12 py-5 rounded-2xl font-black uppercase tracking-widest shadow-xl transition-all active:scale-95">
                    Launch in Index 🚀
                </button>
            </div>
        </div>

        <div class="glass rounded-3xl overflow-hidden shadow-2xl border border-white/5">
            <div class="p-6 border-b border-white/5 bg-white/5 flex justify-between items-center">
                <h3 class="font-bold uppercase text-xs tracking-[0.2em] text-slate-400">Weekly Top AI Projects</h3>
                <span class="text-[9px] bg-emerald-500/10 text-emerald-400 px-2 py-1 rounded border border-emerald-500/20 font-bold">LIVE COMPETITION</span>
            </div>
            <table class="w-full text-left">
                <tbody id="leaderboardBody" class="divide-y divide-white/5">
                    </tbody>
            </table>
            <div id="loaderText" class="p-20 text-center text-slate-600 text-xs font-bold uppercase tracking-widest animate-pulse">
                Fetching AI Directory...
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, where, getDocs, orderBy, limit, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBs8x4SVn65rzWrQJxbwxpOj2XvoNFMhBI",
            authDomain: "webleague-7b833.firebaseapp.com",
            projectId: "webleague-7b833",
            storageBucket: "webleague-7b833.firebasestorage.app",
            messagingSenderId: "689675956792",
            appId: "1:689675956792:web:eeaeecd758e49dc9506ccd"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- Weekly Limit Logic ---
        function getWeekKey() {
            const d = new Date();
            const start = new Date(d.getFullYear(), 0, 1);
            const week = Math.ceil((((d - start) / 86400000) + start.getDay() + 1) / 7);
            return `${d.getFullYear()}-W${week}`;
        }

        function refreshVoteUI() {
            const key = getWeekKey();
            const votes = JSON.parse(localStorage.getItem(`v_log_${key}`) || '[]');
            document.getElementById('votesLeft').innerText = 3 - votes.length;
        }

        // --- Analyze with Spinner ---
        window.analyzeWebsite = async function() {
            const url = document.getElementById('urlInput').value.trim();
            if(!url.startsWith('http')) return alert("Enter a valid URL");

            document.getElementById('btnLabel').innerText = "Analyzing...";
            document.getElementById('btnSpinner').classList.remove('hidden');

            try {
                const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
                const res = await fetch(proxy);
                const data = await res.json();
                const docParsed = new DOMParser().parseFromString(data.contents, 'text/html');

                window.tempAI = {
                    url: url,
                    title: docParsed.querySelector('title')?.innerText || "AI Application",
                    icon: `https://www.google.com/s2/favicons?sz=128&domain=${url}`,
                    votes: 1
                };

                document.getElementById('siteTitle').innerText = window.tempAI.title;
                document.getElementById('siteIcon').src = window.tempAI.icon;
                document.getElementById('siteUrlDisplay').innerText = url;
                document.getElementById('previewCard').classList.remove('hidden');
            } catch(e) { alert("Could not analyze AI Tool."); }

            document.getElementById('btnLabel').innerText = "Analyze & List";
            document.getElementById('btnSpinner').classList.add('hidden');
        };

        // --- Vote with IP-style logic (3 per week) ---
        window.vote = async function(id) {
            const key = getWeekKey();
            let log = JSON.parse(localStorage.getItem(`v_log_${key}`) || '[]');

            if(log.length >= 3) {
                alert("Weekly Limit Reached. You can cast 3 votes per week to keep the index fair.");
                return;
            }

            try {
                await updateDoc(doc(db, "league_sites", id), { votes: increment(1) });
                log.push(id);
                localStorage.setItem(`v_log_${key}`, JSON.stringify(log));
                refreshVoteUI();
                loadIndex();
            } catch(e) { console.error(e); }
        };

        window.confirmSubmission = async function() {
            const sitesRef = collection(db, "league_sites");
            const q = query(sitesRef, where("url", "==", window.tempAI.url));
            const snap = await getDocs(q);
            if(!snap.empty) return alert("AI Tool already listed!");

            await addDoc(sitesRef, window.tempAI);
            document.getElementById('previewCard').classList.add('hidden');
            document.getElementById('urlInput').value = '';
            loadIndex();
        };

        window.loadIndex = async function() {
            const q = query(collection(db, "league_sites"), orderBy("votes", "desc"), limit(100));
            const snap = await getDocs(q);
            const tbody = document.getElementById('leaderboardBody');
            tbody.innerHTML = '';
            document.getElementById('loaderText').classList.add('hidden');

            let r = 1;
            snap.forEach(d => {
                const item = d.data();
                const medal = r === 1 ? '🥇' : r === 2 ? '🥈' : r === 3 ? '🥉' : r;
                tbody.innerHTML += `
                    <tr class="hover:bg-white/[0.02] transition-colors">
                        <td class="p-6 font-bold text-slate-600 text-lg">${medal}</td>
                        <td class="p-6">
                            <div class="flex items-center gap-4">
                                <img src="${item.icon}" class="w-10 h-10 rounded-xl bg-white/5 border border-white/10 p-1">
                                <div>
                                    <div class="font-bold text-white">${item.title}</div>
                                    <div class="text-[10px] text-indigo-400/60 font-mono">${item.url}</div>
                                </div>
                            </div>
                        </td>
                        <td class="p-6 text-center">
                            <div class="text-xl font-black text-white">${item.votes}</div>
                            <div class="text-[8px] font-bold text-slate-500 uppercase tracking-widest">Points</div>
                        </td>
                        <td class="p-6 text-right">
                            <button onclick="vote('${d.id}')" class="bg-indigo-500/10 hover:bg-indigo-600 border border-indigo-500/20 hover:border-indigo-400 text-indigo-400 hover:text-white px-6 py-2 rounded-xl text-[10px] font-black uppercase transition-all active:scale-90">Vote</button>
                        </td>
                    </tr>`;
                r++;
            });
        };

        refreshVoteUI();
        loadIndex();
    </script>
</body>
</html>
