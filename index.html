<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>pcs365 | Weekly AI Leaderboard</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

<style>

body{
font-family:'Plus Jakarta Sans',sans-serif;
background:#05070a;
color:#e2e8f0;
}

.glass{
background:rgba(15,23,42,0.8);
backdrop-filter:blur(16px);
border:1px solid rgba(255,255,255,0.08);
}

.hero-glow{
background:radial-gradient(circle at 50% -20%,#312e81,#05070a);
}

.accent-text{
background:linear-gradient(90deg,#818cf8,#c084fc);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.loader{
width:18px;
height:18px;
border:2px solid rgba(255,255,255,0.1);
border-top:2px solid white;
border-radius:50%;
animation:spin 0.6s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

.btn-gradient{
background:linear-gradient(90deg,#4f46e5,#7c3aed);
}

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.85);
z-index:100;
align-items:center;
justify-content:center;
}

.modal.active{
display:flex;
}

</style>
</head>

<body class="min-h-screen hero-glow">

<nav class="p-6 border-b border-white/5 bg-black/20 sticky top-0 z-50 backdrop-blur-md">

<div class="max-w-6xl mx-auto flex justify-between items-center">

<div class="flex items-center gap-3">
<div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center font-extrabold">AI</div>
<span class="text-xl font-extrabold uppercase">pcs365</span>
</div>

<div class="bg-indigo-500/10 border border-indigo-500/20 px-4 py-2 rounded-full font-bold text-indigo-300 text-xs">
Votes Left:
<span id="votesLeft" class="text-white">3</span>
</div>

</div>

</nav>

<header class="pt-20 pb-10 text-center px-4">

<h1 class="text-6xl font-extrabold mb-6 uppercase">
Global <span class="accent-text">AI Index</span>
</h1>

<p class="text-slate-400 mb-10">
Community ranking for AI tools using social signals.
</p>

<div class="max-w-2xl mx-auto glass p-2 rounded-2xl flex gap-2">

<input
type="url"
id="urlInput"
placeholder="Enter AI tool URL"
class="flex-1 bg-transparent p-4 outline-none"
/>

<button onclick="analyzeWebsite()" id="mainBtn"
class="btn-gradient px-8 py-4 rounded-xl font-bold flex items-center gap-2">

<span id="btnLabel">Analyze</span>
<div id="btnSpinner" class="loader hidden"></div>

</button>

</div>

<div id="scanLog" class="text-xs text-indigo-400 mt-4"></div>

<input
id="searchInput"
oninput="filterTable()"
placeholder="Search..."
class="mt-8 p-3 bg-white/5 border border-white/10 rounded-xl w-72"
/>

</header>

<main class="max-w-6xl mx-auto px-4 pb-32">

<div id="previewCard" class="hidden glass p-8 rounded-3xl mb-10">

<div class="flex items-center gap-6">

<img id="siteIcon" class="w-16 h-16 rounded-xl"/>

<div>

<h2 id="siteTitle" class="text-2xl font-bold"></h2>

<p id="siteDesc" class="text-slate-400 text-sm"></p>

<span id="sitePR"></span>

</div>

<button onclick="confirmSubmission()"
class="ml-auto bg-white text-black px-8 py-4 rounded-xl font-bold">
Add
</button>

</div>

</div>

<div class="glass rounded-3xl overflow-hidden">

<table class="w-full text-left">

<thead class="text-xs uppercase text-slate-500">

<tr>
<th class="p-4">Rank</th>
<th class="p-4">AI Tool</th>
<th class="p-4">PR</th>
<th class="p-4">Votes</th>
<th class="p-4">Score</th>
<th class="p-4"></th>
</tr>

</thead>

<tbody id="leaderboardBody"></tbody>

</table>

</div>

</main>

<script type="module">

import {initializeApp}
from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js"

import {
getFirestore,
collection,
addDoc,
getDocs,
query,
orderBy,
limit,
doc,
updateDoc,
increment
}
from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"


const firebaseConfig={
apiKey:"AIzaSyBs8x4SVn65rzWrQJxbwxpOj2XvoNFMhBI",
authDomain:"webleague-7b833.firebaseapp.com",
projectId:"webleague-7b833"
}

const app=initializeApp(firebaseConfig)

const db=getFirestore(app)

let masterData=[]


async function getSignals(domain){

let pr=1

try{

const reddit=await fetch(`https://www.reddit.com/search.json?q=${domain}&limit=5`).then(r=>r.json())

pr+=reddit.data.children.length*0.3

}catch{}

try{

const github=await fetch(`https://api.github.com/search/repositories?q=${domain}`).then(r=>r.json())

const stars=github.items?.[0]?.stargazers_count||0

pr+=Math.log10(stars+1)

}catch{}

if(domain.includes("ai")) pr+=0.7

return Math.min(9.9,pr).toFixed(1)

}



window.analyzeWebsite=async function(){

let url=document.getElementById("urlInput").value

if(!url) return

if(!url.startsWith("http")) url="https://"+url

const domain=new URL(url).hostname.replace("www.","")

const pr=await getSignals(domain)

window.tempAI={

url:url,
title:domain,
description:"AI Tool",
icon:`https://logo.clearbit.com/${domain}`,
votes:1,
pr:pr

}

document.getElementById("siteTitle").innerText=domain

document.getElementById("siteDesc").innerText="AI Tool"

document.getElementById("siteIcon").src=`https://logo.clearbit.com/${domain}`

document.getElementById("sitePR").innerText="PR "+pr

document.getElementById("previewCard").classList.remove("hidden")

}


window.confirmSubmission=async function(){

await addDoc(collection(db,"league_sites"),window.tempAI)

loadIndex()

document.getElementById("previewCard").classList.add("hidden")

}


window.vote=async function(id){

await updateDoc(doc(db,"league_sites",id),{votes:increment(1)})

loadIndex()

}


window.loadIndex=async function(){

const q=query(collection(db,"league_sites"),orderBy("votes","desc"),limit(100))

const snap=await getDocs(q)

masterData=snap.docs.map(d=>({id:d.id,...d.data()}))

renderTable(masterData)

}


function renderTable(data){

const tbody=document.getElementById("leaderboardBody")

tbody.innerHTML=""

data.forEach((item,i)=>{

const score=(item.votes*2)+parseFloat(item.pr)

tbody.innerHTML+=`

<tr class="border-t border-white/5">

<td class="p-4 font-bold">${i+1}</td>

<td class="p-4 flex items-center gap-3">

<img src="${item.icon}"
class="w-6 h-6 rounded"/>

<a href="${item.url}" target="_blank">${item.title}</a>

</td>

<td class="p-4">${item.pr}</td>

<td class="p-4">${item.votes}</td>

<td class="p-4">${score.toFixed(1)}</td>

<td class="p-4">

<button onclick="vote('${item.id}')"
class="bg-indigo-600 px-3 py-1 rounded text-xs">
Vote
</button>

</td>

</tr>

`

})

}


window.filterTable=function(){

const term=document.getElementById("searchInput").value.toLowerCase()

const filtered=masterData.filter(x=>x.title.toLowerCase().includes(term))

renderTable(filtered)

}


loadIndex()

</script>

</body>
</html>
