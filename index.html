<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCS365 | Global AI League & Index</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #05070a; color: #e2e8f0; scroll-behavior: smooth; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.08); }
        .hero-glow { background: radial-gradient(circle at 50% -20%, #312e81, #05070a); }
        .accent-text { background: linear-gradient(90deg, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .loader { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.1); border-top: 2px solid #ffffff; border-radius: 50%; animation: spin 0.6s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .btn-gradient { background: linear-gradient(90deg, #4f46e5, #7c3aed); transition: all 0.3s ease; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
        tr:hover { background: rgba(255,255,255,0.02); }
        .pr-badge { font-weight: 900; letter-spacing: -0.02em; transition: all 0.3s ease; }
    </style>
</head>
<body class="min-h-screen hero-glow">

    <div id="badgeModal" class="modal" onclick="closeModal()">
        <div class="glass p-8 rounded-3xl max-w-lg w-full" onclick="event.stopPropagation()">
            <h3 class="text-2xl font-bold mb-2">Get Your AI Badge</h3>
            <div class="bg-black/50 p-4 rounded-xl mb-6 text-center">
                <div id="badgePreview" class="mb-4 flex justify-center"></div>
                <code id="badgeCode" class="text-[10px] text-indigo-300 break-all block p-3 bg-white/5 rounded"></code>
            </div>
            <button onclick="copyBadgeCode()" class="w-full bg-indigo-600 py-3 rounded-xl font-bold uppercase">Copy HTML Code</button>
        </div>
    </div>

    <nav class="p-6 border-b border-white/5 bg-black/20 sticky top-0 z-50 backdrop-blur-md">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center font-extrabold text-white shadow-lg shadow-indigo-500/20">AI</div>
                <span class="text-xl font-extrabold tracking-tight uppercase">PCS365 <span class="text-indigo-400">Index</span></span>
            </div>
            <div class="bg-indigo-500/10 border border-indigo-500/20 px-4 py-2 rounded-full">
                <span class="text-[10px] font-bold text-indigo-300 uppercase">Weekly Votes Left: <span id="votesLeft" class="text-white text-xs">3</span></span>
            </div>
        </div>
    </nav>

    <header class="pt-20 pb-10 text-center px-4">
        <h1 class="text-6xl md:text-7xl font-extrabold tracking-tighter mb-6 italic">GLOBAL <span class="accent-text">AI LEAGUE</span></h1>
        <p class="text-slate-400 max-w-3xl mx-auto mb-10 text-lg font-medium leading-relaxed">
            Community-driven AI rankings. We analyze real-time signals from Reddit, HackerNews, and GitHub to calculate the <b>Power Score (PR)</b>. Vote for your favorites!
        </p>
        
        <div class="max-w-2xl mx-auto glass p-2 rounded-2xl flex flex-col md:flex-row gap-2 shadow-2xl mb-8">
            <input type="url" id="urlInput" placeholder="Paste AI App URL (https://...)" 
                class="flex-1 bg-transparent p-4 outline-none text-white font-medium placeholder:text-slate-600">
            <button onclick="analyzeWebsite()" id="mainBtn" class="btn-gradient px-10 py-4 rounded-xl font-bold flex items-center justify-center gap-3 active:scale-95 transition-transform">
                <span id="btnLabel">Analyze & List</span>
                <div id="btnSpinner" class="loader hidden"></div>
            </button>
        </div>

        <div class="max-w-md mx-auto relative">
            <input type="text" id="searchInput" oninput="filterTable()" placeholder="Search league tools..." 
                class="w-full bg-white/5 border border-white/10 p-3 rounded-xl outline-none focus:border-indigo-500 text-sm">
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 pb-32">
        <div id="previewCard" class="hidden glass rounded-3xl p-8 mb-6 border-indigo-500/40">
            <div class="flex flex-col md:flex-row items-center justify-between gap-8 text-left">
                <div class="flex items-center gap-6">
                    <img id="siteIcon" src="" class="w-20 h-20 rounded-2xl bg-white/5 p-2 border border-white/10 shadow-2xl">
                    <div>
                        <div class="flex items-center gap-3 mb-2">
                            <h2 id="siteTitle" class="text-3xl font-black text-white tracking-tighter"></h2>
                            <span id="sitePR" class="px-4 py-1 rounded-full font-black text-sm pr-badge"></span>
                        </div>
                        <p id="siteDesc" class="text-slate-400 text-sm mb-4 max-w-md italic"></p>
                        <div id="metricsVisual" class="flex gap-2"></div>
                    </div>
                </div>
                <button onclick="confirmSubmission()" class="bg-white text-black hover:bg-slate-200 px-12 py-5 rounded-2xl font-black uppercase tracking-widest shadow-xl transition-all">Confirm Listing</button>
            </div>
        </div>

        <div class="glass rounded-3xl overflow-hidden border border-white/5 shadow-2xl">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="text-[10px] uppercase tracking-[0.2em] text-slate-500 border-b border-white/5 bg-white/[0.02]">
                            <th class="p-6">Rank</th>
                            <th class="p-6">AI Application</th>
                            <th class="p-6">Social Signals</th>
                            <th class="p-6 text-center">Weekly Pts</th>
                            <th class="p-6"></th>
                        </tr>
                    </thead>
                    <tbody id="leaderboardBody" class="divide-y divide-white/5"></tbody>
                </table>
            </div>
            <div id="loaderText" class="p-20 text-center text-slate-600 text-xs font-bold uppercase animate-pulse tracking-[0.3em]">Syncing League...</div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, where, getDocs, orderBy, limit, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBs8x4SVn65rzWrQJxbwxpOj2XvoNFMhBI",
            authDomain: "webleague-7b833.firebaseapp.com",
            projectId: "webleague-7b833",
            storageBucket: "webleague-7b833.firebasestorage.app",
            messagingSenderId: "689675956792",
            appId: "1:689675956792:web:eeaeecd758e49dc9506ccd"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let masterData = [];

        // --- ENHANCED PR LOGIC (Reddit, HN, GitHub) ---
        async function calculateDeepPR(name, url) {
            const controller = new AbortController();
            setTimeout(() => controller.abort(), 4500);

            let reddit = 0, hn = 0, github = 0;

            try {
                // HackerNews Search
                const hnRes = await fetch(`https://hn.algolia.com/api/v1/search?query=${encodeURIComponent(name)}&hitsPerPage=5`, { signal: controller.signal });
                const hnData = await hnRes.json();
                hn = hnData.hits?.length || 0;
            } catch(e) { hn = 0; }

            try {
                // Reddit via Proxy
                const rUrl = `https://www.reddit.com/search.json?q=${encodeURIComponent(name)}&limit=3`;
                const rRes = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(rUrl)}&t=${Date.now()}`, { signal: controller.signal });
                const rData = await rRes.json();
                reddit = JSON.parse(rData.contents).data?.children?.length || 0;
            } catch(e) { reddit = 0; }

            try {
                // GitHub Search (Popularity)
                const ghRes = await fetch(`https://api.github.com/search/repositories?q=${encodeURIComponent(name)}&sort=stars`, { signal: controller.signal });
                const ghData = await ghRes.json();
                github = ghData.items?.[0]?.stargazers_count || 0;
            } catch(e) { github = 0; }

            // Score Logic
            let score = 2.0; // Base for unknown tools
            score += (hn * 0.5);
            score += (reddit * 0.4);
            score += (github > 0 ? 1.5 + Math.min(2.5, github / 500) : 0);
            
            if(url.includes('.ai')) score += 0.5;
            
            // Penalty for 0 signals
            if(hn === 0 && reddit === 0 && github === 0) score = Math.min(score, 3.2);

            return { reddit, hn, github, pr: Math.min(9.9, score).toFixed(1) };
        }

        window.analyzeWebsite = async function() {
            const urlInput = document.getElementById('urlInput');
            const url = urlInput.value.trim();
            if(!url.startsWith('http')) return alert("Please enter full URL");

            document.getElementById('btnLabel').innerText = "Scanning Deep Signals...";
            document.getElementById('btnSpinner').classList.remove('hidden');

            try {
                const metaRes = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`);
                const metaJson = await metaRes.json();
                const docParsed = new DOMParser().parseFromString(metaJson.contents, 'text/html');
                const title = (docParsed.querySelector('title')?.innerText || url.split('/')[2]).split('|')[0].trim();
                const desc = docParsed.querySelector('meta[name="description"]')?.content?.substring(0, 100) || "Emerging AI Application.";

                const stats = await calculateDeepPR(title, url);
                
                window.tempAI = { 
                    url, title, description: desc, pr: stats.pr, 
                    icon: `https://www.google.com/s2/favicons?sz=128&domain=${url}`, 
                    votes: 1, metrics: { reddit: stats.reddit, hn: stats.hn, github: stats.github } 
                };

                const prBadge = document.getElementById('sitePR');
                prBadge.innerText = `PR ${stats.pr}`;
                prBadge.className = `px-4 py-1 rounded-full font-black text-sm pr-badge ${getPRClass(stats.pr)}`;
                
                document.getElementById('siteTitle').innerText = title;
                document.getElementById('siteDesc').innerText = desc;
                document.getElementById('siteIcon').src = window.tempAI.icon;
                document.getElementById('metricsVisual').innerHTML = `
                    <div class="bg-orange-500/10 text-orange-400 text-[10px] font-bold px-3 py-1 rounded-lg border border-orange-500/20">Reddit: ${stats.reddit}</div>
                    <div class="bg-emerald-500/10 text-emerald-400 text-[10px] font-bold px-3 py-1 rounded-lg border border-emerald-500/20">HackerN: ${stats.hn}</div>
                    <div class="bg-blue-500/10 text-blue-400 text-[10px] font-bold px-3 py-1 rounded-lg border border-blue-500/20">GitHub: ${stats.github}</div>
                `;
                document.getElementById('previewCard').classList.remove('hidden');
            } catch (e) {
                alert("Deep scan failed. Listing with base score.");
            } finally {
                document.getElementById('btnLabel').innerText = "Analyze & List";
                document.getElementById('btnSpinner').classList.add('hidden');
            }
        };

        function getPRClass(pr) {
            if(pr >= 8) return "bg-yellow-500/20 text-yellow-400 border border-yellow-500/40 shadow-[0_0_15px_rgba(234,179,8,0.2)]";
            if(pr >= 5) return "bg-indigo-600 text-white shadow-lg shadow-indigo-500/30";
            return "bg-slate-500/10 text-slate-500 border border-white/5";
        }

        window.confirmSubmission = async function() {
            await addDoc(collection(db, "league_sites"), window.tempAI);
            document.getElementById('previewCard').classList.add('hidden');
            loadIndex();
        };

        window.vote = async function(id) {
            const key = `v_log_${new Date().getFullYear()}-W${Math.ceil(new Date().getDate()/7)}`;
            let log = JSON.parse(localStorage.getItem(key) || '[]');
            if(log.length >= 3) return alert("Weekly Limit Reached.");
            await updateDoc(doc(db, "league_sites", id), { votes: increment(1) });
            log.push(id); localStorage.setItem(key, JSON.stringify(log));
            loadIndex();
        };

        window.openBadgeModal = function(title, rank) {
            const code = `<div style="padding:20px; background:#05070a; border:1px solid #4f46e5; border-radius:15px; color:white; text-align:center; font-family:sans-serif; width:220px;">
                <div style="font-size:10px; color:#818cf8; font-weight:bold; letter-spacing:2px;">RANKED #${rank}</div>
                <div style="font-size:18px; font-weight:800; margin:10px 0;">${title}</div>
                <div style="font-size:10px; opacity:0.5;">PCS365 AI LEAGUE</div>
            </div>`;
            document.getElementById('badgePreview').innerHTML = code;
            document.getElementById('badgeCode').innerText = code;
            document.getElementById('badgeModal').classList.add('active');
        };

        window.closeModal = () => document.getElementById('badgeModal').classList.remove('active');
        window.copyBadgeCode = () => { navigator.clipboard.writeText(document.getElementById('badgeCode').innerText); alert("Copied!"); };

        window.loadIndex = async function() {
            const q = query(collection(db, "league_sites"), orderBy("votes", "desc"), limit(100));
            const snap = await getDocs(q);
            masterData = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            renderTable(masterData);
            document.getElementById('loaderText').classList.add('hidden');
            const key = `v_log_${new Date().getFullYear()}-W${Math.ceil(new Date().getDate()/7)}`;
            document.getElementById('votesLeft').innerText = 3 - JSON.parse(localStorage.getItem(key) || '[]').length;
        };

        function renderTable(data) {
            const tbody = document.getElementById('leaderboardBody');
            tbody.innerHTML = '';
            data.forEach((item, i) => {
                const rank = i + 1;
                const rIcon = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : `<span class="opacity-10">${rank}</span>`;
                tbody.innerHTML += `
                    <tr>
                        <td class="p-6 font-black text-2xl">${rIcon}</td>
                        <td class="p-6">
                            <div class="flex items-center gap-4">
                                <img src="${item.icon}" class="w-12 h-12 rounded-xl bg-white/5 p-1 border border-white/5">
                                <div>
                                    <div class="flex items-center gap-2 mb-0.5">
                                        <div class="font-bold text-white text-lg tracking-tight">${item.title}</div>
                                        <span class="text-[10px] font-black ${getPRClass(item.pr)} px-2 py-0.5 rounded-md">PR ${item.pr || '2.0'}</span>
                                    </div>
                                    <div class="text-[11px] text-slate-500 truncate max-w-[250px] italic">${item.description}</div>
                                </div>
                            </div>
                        </td>
                        <td class="p-6">
                            <div class="flex flex-col gap-0.5 font-bold text-[9px] uppercase tracking-tighter">
                                <span class="text-orange-500/80">Reddit: ${item.metrics?.reddit || 0}</span>
                                <span class="text-emerald-500/80">HackerN: ${item.metrics?.hn || 0}</span>
                                <span class="text-blue-500/80">GitHub: ${item.metrics?.github || 0}</span>
                            </div>
                        </td>
                        <td class="p-6 text-center">
                            <div class="text-3xl font-black text-white tracking-tighter">${item.votes}</div>
                            <div class="text-[8px] font-bold text-slate-600 uppercase">Points</div>
                        </td>
                        <td class="p-6 text-right space-x-2">
                            <button onclick="openBadgeModal('${item.title}', ${rank})" class="text-[10px] font-bold text-slate-600 hover:text-indigo-400 uppercase">Badge</button>
                            <button onclick="vote('${item.id}')" class="bg-indigo-600/10 hover:bg-indigo-600 border border-indigo-500/20 text-indigo-400 hover:text-white px-6 py-2.5 rounded-xl text-[10px] font-black uppercase transition-all active:scale-95 shadow-lg">Vote</button>
                        </td>
                    </tr>`;
            });
        }
        window.filterTable = () => {
            const term = document.getElementById('searchInput').value.toLowerCase();
            renderTable(masterData.filter(s => s.title.toLowerCase().includes(term)));
        };
        loadIndex();
    </script>
</body>
</html>
