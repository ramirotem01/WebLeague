<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pcs365 | AI Global Index</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #05070a; color: #e2e8f0; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); }
        .hero-glow { background: radial-gradient(circle at 50% -20%, #312e81, #05070a); }
        .accent-text { background: linear-gradient(90deg, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .loader { width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.1); border-top: 2px solid #6366f1; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .progress-fill { transition: width 1s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
        .btn-loading { opacity: 0.4; pointer-events: none; }
        
        @media (max-width: 768px) {
            .hide-mobile { display: none; }
            .table-container { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        }
    </style>
</head>
<body class="min-h-screen hero-glow">

    <div id="badgeModal" class="modal" onclick="closeModal()">
        <div class="glass p-10 rounded-[2.5rem] max-w-lg w-full text-center border-indigo-500/30" onclick="event.stopPropagation()">
            <h3 id="modalTitle" class="text-2xl font-black mb-2 text-white italic uppercase tracking-tighter">Embed Badge</h3>
            <div id="badgePreview" class="mb-10 flex justify-center scale-125"></div>
            <div class="text-left mb-6">
                <span class="text-[9px] font-black text-indigo-400 uppercase tracking-widest block mb-2">HTML Code</span>
                <code id="badgeCode" class="text-[10px] text-indigo-200 break-all block p-4 bg-black/60 border border-white/5 rounded-xl"></code>
            </div>
            <button onclick="copyBadgeCode()" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white py-4 rounded-2xl font-black uppercase tracking-widest transition-all shadow-lg shadow-indigo-600/20">Copy To Clipboard</button>
        </div>
    </div>

    <nav class="p-6 border-b border-white/5 bg-black/20 sticky top-0 z-50 backdrop-blur-md">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center font-extrabold text-white shadow-lg shadow-indigo-600/20">AI</div>
                <span class="text-xl font-extrabold tracking-tight uppercase italic tracking-tighter">pcs365</span>
            </div>
            <div class="bg-indigo-500/5 border border-indigo-500/10 px-5 py-2 rounded-full font-bold text-indigo-300 text-[10px] tracking-widest uppercase">
                Votes Left: <span id="votesLeft" class="text-white">3</span>
            </div>
        </div>
    </nav>

    <header class="pt-24 pb-16 text-center px-4">
        <h1 class="text-5xl md:text-8xl font-extrabold tracking-tighter mb-6 italic uppercase leading-none">Global <span class="accent-text">AI Index</span></h1>
        <p class="text-slate-400 max-w-2xl mx-auto mb-12 text-base md:text-lg font-medium italic">Discover and rank the world's most impactful AI tools.</p>
        
        <div class="max-w-2xl mx-auto glass p-2 rounded-3xl flex flex-col md:flex-row gap-2 shadow-2xl">
            <input type="url" id="urlInput" placeholder="Paste AI Tool URL" class="flex-1 bg-transparent p-4 outline-none text-white font-semibold">
            <button onclick="analyzeWebsite()" id="mainBtn" class="bg-indigo-600 hover:bg-indigo-500 px-12 py-4 rounded-2xl font-black flex items-center justify-center gap-3 transition-all text-sm uppercase tracking-widest">
                <span>Scan</span>
                <div id="btnSpinner" class="loader hidden"></div>
            </button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 md:px-6 pb-40">
        <div id="previewCard" class="hidden mb-20 animate-in fade-in duration-700">
            <div class="glass rounded-[2rem] p-1 border-indigo-500/20">
                <div class="bg-[#0b0f1a]/80 rounded-[1.9rem] p-6 md:p-10">
                    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                        <div class="lg:col-span-3 flex flex-col items-center lg:items-start">
                            <img id="siteIcon" src="" class="w-24 h-24 rounded-[1.5rem] mb-4 bg-black border border-white/10 p-2 shadow-2xl">
                            <h2 id="siteTitle" class="text-2xl font-black text-white italic tracking-tighter truncate w-full"></h2>
                            <p id="siteDesc" class="text-slate-500 text-xs mt-2"></p>
                        </div>
                        <div class="lg:col-span-6 border-y lg:border-y-0 lg:border-x border-white/5 py-8 lg:py-0 lg:px-8">
                            <div id="signalGrid" class="grid grid-cols-2 sm:grid-cols-3 gap-3"></div>
                        </div>
                        <div class="lg:col-span-3 flex flex-col items-center justify-center">
                            <div id="sitePR" class="text-7xl font-black italic text-white">0.0</div>
                            <button id="confirmBtn" onclick="confirmSubmission()" class="w-full mt-6 bg-white text-black py-4 rounded-xl font-black uppercase text-[10px] tracking-widest transition-all">Add To Index</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="glass rounded-[1.5rem] md:rounded-[2.5rem] overflow-hidden shadow-2xl border border-white/5">
            <div class="table-container">
                <table class="w-full text-left">
                    <thead>
                        <tr class="text-[10px] uppercase tracking-widest text-slate-500 border-b border-white/5 bg-white/[0.03]">
                            <th class="p-4 md:p-8">Rank</th>
                            <th class="p-4 md:p-8">Application</th>
                            <th class="p-4 md:p-8 hide-mobile">Signals</th>
                            <th class="p-4 md:p-8 text-center">Votes</th>
                            <th class="p-4 md:p-8 text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboardBody" class="divide-y divide-white/5"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, where, getDocs, orderBy, limit, doc, updateDoc, increment, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBs8x4SVn65rzWrQJxbwxpOj2XvoNFMhBI",
            authDomain: "webleague-7b833.firebaseapp.com",
            projectId: "webleague-7b833",
            storageBucket: "webleague-7b833.firebasestorage.app",
            messagingSenderId: "689675956792",
            appId: "1:689675956792:web:eeaeecd758e49dc9506ccd"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let affiliateLink = null;

        // Fetch link from DB for protection
        async function fetchAffiliateData() {
            try {
                const docRef = doc(db, "app_settings", "ads");
                const docSnap = await getDoc(docRef);
                if (docSnap.exists()) affiliateLink = docSnap.data().aliexpress_url;
            } catch (e) { console.error("Ad sync failed"); }
        }

        window.safeAffiliateRedirect = function() {
            if (affiliateLink) window.open(affiliateLink, '_blank');
        };

        window.loadIndex = async function() {
            await fetchAffiliateData();
            const q = query(collection(db, "league_sites"), orderBy("votes", "desc"), limit(100));
            const snap = await getDocs(q);
            renderTable(snap.docs.map(d => ({ id: d.id, ...d.data() })));
        };

        function renderTable(data) {
            const tbody = document.getElementById('leaderboardBody');
            let html = '';
            
            data.forEach((item, i) => {
                html += `
                    <tr class="hover:bg-white/[0.02] transition-colors group">
                        <td class="p-4 md:p-8 font-black text-2xl md:text-4xl opacity-10 italic">${i + 1}</td>
                        <td class="p-4 md:p-8">
                            <div class="flex items-center gap-4">
                                <img src="${item.icon}" class="w-10 h-10 md:w-14 md:h-14 rounded-xl bg-black border border-white/10 p-1">
                                <div>
                                    <div class="font-bold text-white text-sm md:text-xl tracking-tighter">${item.title}</div>
                                    <div class="text-[9px] text-indigo-400 font-black uppercase italic">PR ${item.pr}</div>
                                </div>
                            </div>
                        </td>
                        <td class="p-8 hide-mobile">
                            <div class="flex flex-wrap gap-1">
                                ${Object.keys(item.metrics || {}).slice(0, 3).map(k => `<span class="text-[7px] font-black px-1.5 py-0.5 rounded bg-white/5 text-slate-500 uppercase border border-white/5">${k}</span>`).join('')}
                            </div>
                        </td>
                        <td class="p-4 md:p-8 text-center font-black text-xl md:text-4xl italic text-white">${item.votes}</td>
                        <td class="p-4 md:p-8 text-right">
                            <button onclick="vote('${item.id}')" class="bg-orange-500 hover:bg-orange-600 text-white px-4 md:px-7 py-2 md:py-3 rounded-xl text-[9px] md:text-[10px] font-black uppercase tracking-widest transition-all">Vote</button>
                        </td>
                    </tr>`;

                // Native Slim Ad Row (Every 10 rows)
                if ((i + 1) % 10 === 0 && i !== data.length - 1) {
                    html += `
                        <tr>
                            <td colspan="5" class="p-0 border-y border-white/5">
                                <div class="flex items-center justify-between px-8 py-2 bg-[#0a0c14] cursor-pointer group hover:bg-indigo-950/10 transition-all" onclick="safeAffiliateRedirect()">
                                    <div class="flex items-center gap-3 shrink-0">
                                        <span class="text-[7px] font-black text-indigo-400 uppercase tracking-widest border border-indigo-400/30 px-1.5 py-0.5 rounded">Ad</span>
                                        <div class="hidden lg:block">
                                            <p class="text-[10px] text-white font-bold leading-none">AliExpress Tech Deals</p>
                                            <p class="text-[8px] text-slate-500 font-medium">Exclusive offers for developers</p>
                                        </div>
                                    </div>
                                    <div class="h-[35px] flex-1 flex justify-center px-4">
                                        <img src="https://ae01.alicdn.com/kf/S3619e57974f148d087c950fe497cdf55q/300x250.jpg" 
                                             class="h-full w-auto object-contain transition-transform group-hover:scale-110" 
                                             alt="AliExpress">
                                    </div>
                                    <div class="flex items-center gap-2 shrink-0 bg-indigo-600/20 px-3 py-1.5 rounded-lg border border-indigo-500/20 group-hover:bg-indigo-600 transition-all">
                                        <span class="text-indigo-400 group-hover:text-white font-black text-[9px] uppercase tracking-tighter">Get Deal</span>
                                        <svg class="w-3 h-3 text-indigo-400 group-hover:text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M14 5l7 7-7 7"></path></svg>
                                    </div>
                                </div>
                            </td>
                        </tr>`;
                }
            });
            tbody.innerHTML = html;
        }

        window.vote = async (id) => {
            await updateDoc(doc(db, "league_sites", id), { votes: increment(1) });
            loadIndex();
        };

        window.closeModal = () => document.getElementById('badgeModal').classList.remove('active');
        loadIndex();
    </script>
</body>
</html>
