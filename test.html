<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pcs365 | AI Global Index</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #05070a; color: #e2e8f0; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); }
        .hero-glow { background: radial-gradient(circle at 50% -20%, #312e81, #05070a); }
        .accent-text { background: linear-gradient(90deg, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .loader { width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.1); border-top: 2px solid #6366f1; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
        
        .ad-container { position: relative; overflow: hidden; height: 60px; display: flex; align-items: center; cursor: pointer; }
        .ad-blur-bg { position: absolute; inset: 0; background-size: cover; background-position: center; filter: blur(30px) brightness(0.3); transform: scale(1.5); z-index: 0; }
        .ad-content { position: relative; z-index: 1; display: flex; width: 100%; height: 100%; align-items: center; justify-content: space-between; padding: 0 32px; }

        @media (max-width: 768px) {
            .hide-mobile { display: none; }
            .table-container { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        }
    </style>
</head>
<body class="min-h-screen hero-glow">

    <div id="badgeModal" class="modal" onclick="closeModal()">
        <div class="glass p-10 rounded-[2.5rem] max-w-lg w-full text-center border-indigo-500/30" onclick="event.stopPropagation()">
            <h3 id="modalTitle" class="text-2xl font-black mb-2 text-white italic uppercase tracking-tighter">Embed Badge</h3>
            <div id="badgePreview" class="mb-10 flex justify-center scale-125"></div>
            <div class="text-left mb-6">
                <span class="text-[9px] font-black text-indigo-400 uppercase tracking-widest block mb-2">HTML Code</span>
                <code id="badgeCode" class="text-[10px] text-indigo-200 break-all block p-4 bg-black/60 border border-white/5 rounded-xl font-mono"></code>
            </div>
            <button onclick="copyBadgeCode()" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white py-4 rounded-2xl font-black uppercase tracking-widest transition-all shadow-lg shadow-indigo-600/20">Copy To Clipboard</button>
        </div>
    </div>

    <nav class="p-6 border-b border-white/5 bg-black/20 sticky top-0 z-50 backdrop-blur-md">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center font-extrabold text-white">AI</div>
                <span class="text-xl font-extrabold tracking-tight uppercase italic tracking-tighter">pcs365</span>
            </div>
            <div class="bg-indigo-500/5 border border-indigo-500/10 px-5 py-2 rounded-full font-bold text-indigo-300 text-[10px] tracking-widest uppercase">
                Votes Left: <span id="votesLeft" class="text-white">3</span>
            </div>
        </div>
    </nav>

    <header class="pt-24 pb-16 text-center px-4">
        <h1 class="text-5xl md:text-8xl font-extrabold tracking-tighter mb-6 italic uppercase leading-none">Global <span class="accent-text">AI Index</span></h1>
        <p class="text-slate-400 max-w-2xl mx-auto mb-12 text-base md:text-lg font-medium italic">
            Discover and rank the world's most impactful AI tools based on real-time developer signals, social buzz, and community votes.
        </p>
        
        <div class="max-w-2xl mx-auto glass p-2 rounded-3xl flex flex-col md:flex-row gap-2 shadow-2xl border-white/10">
            <input type="url" id="urlInput" placeholder="Paste AI Tool URL" class="flex-1 bg-transparent p-4 outline-none text-white font-semibold placeholder:text-slate-600">
            <button onclick="analyzeWebsite()" id="mainBtn" class="bg-indigo-600 hover:bg-indigo-500 px-12 py-4 rounded-2xl font-black flex items-center justify-center gap-3 transition-all text-sm uppercase tracking-widest">
                <span>Scan</span>
                <div id="btnSpinner" class="loader hidden"></div>
            </button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 md:px-6 pb-40">
        <div id="previewCard" class="hidden mb-20 animate-in fade-in duration-700">
            <div class="glass rounded-[2rem] p-6 md:p-10 border-indigo-500/30">
                <div class="flex flex-col md:flex-row items-center gap-8">
                    <img id="siteIcon" src="" class="w-20 h-20 rounded-2xl bg-black border border-white/10 p-2">
                    <div class="flex-1 text-center md:text-left">
                        <h2 id="siteTitle" class="text-3xl font-black text-white italic tracking-tighter"></h2>
                        <p id="siteDesc" class="text-slate-500 text-sm mt-2"></p>
                        <div id="signalGrid" class="flex flex-wrap gap-2 mt-4 justify-center md:justify-start"></div>
                    </div>
                    <div class="text-center">
                        <div id="sitePR" class="text-6xl font-black italic accent-text">0.0</div>
                        <button onclick="confirmSubmission()" class="mt-4 bg-white text-black px-8 py-3 rounded-xl font-black uppercase text-[10px] tracking-widest">Add To Index</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="glass rounded-[1.5rem] md:rounded-[2.5rem] overflow-hidden shadow-2xl border border-white/5">
            <div class="table-container">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="text-[10px] uppercase tracking-widest text-slate-500 border-b border-white/5 bg-white/[0.03]">
                            <th class="p-4 md:p-8">Rank</th>
                            <th class="p-4 md:p-8">Application</th>
                            <th class="p-4 md:p-8 hide-mobile">Signals</th>
                            <th class="p-4 md:p-8 text-center">Votes</th>
                            <th class="p-4 md:p-8 text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboardBody" class="divide-y divide-white/5"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, where, getDocs, orderBy, limit, doc, updateDoc, increment, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBs8x4SVn65rzWrQJxbwxpOj2XvoNFMhBI",
            authDomain: "webleague-7b833.firebaseapp.com",
            projectId: "webleague-7b833",
            storageBucket: "webleague-7b833.firebasestorage.app",
            messagingSenderId: "689675956792",
            appId: "1:689675956792:web:eeaeecd758e49dc9506ccd"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let currentScan = null;
        let affiliateLink = null;
        const adImageUrl = "https://ae01.alicdn.com/kf/S3619e57974f148d087c950fe497cdf55q/300x250.jpg";

        // --- Voting Logic ---
        let votes = parseInt(localStorage.getItem('user_votes') || '3');
        document.getElementById('votesLeft').innerText = votes;

        window.vote = async (id) => {
            if (votes <= 0) return alert("No votes left!");
            try {
                await updateDoc(doc(db, "league_sites", id), { votes: increment(1) });
                votes--;
                localStorage.setItem('user_votes', votes);
                document.getElementById('votesLeft').innerText = votes;
                loadIndex();
            } catch (e) { alert("Vote failed. Check Rules."); }
        };

        // --- Scanner Logic ---
        window.analyzeWebsite = async function() {
            const url = document.getElementById('urlInput').value.trim();
            if(!url) return;
            
            document.getElementById('btnSpinner').classList.remove('hidden');
            const domain = new URL(url.startsWith('http') ? url : `https://${url}`).hostname;
            
            // Mock Analysis
            currentScan = {
                title: domain.split('.')[0].toUpperCase(),
                url: domain,
                icon: `https://www.google.com/s2/favicons?domain=${domain}&sz=128`,
                pr: (Math.random() * (9.9 - 7.5) + 7.5).toFixed(1),
                metrics: { "Dev Signal": "Strong", "Latency": "Optimal", "Security": "Verified" },
                votes: 1
            };

            document.getElementById('siteTitle').innerText = currentScan.title;
            document.getElementById('siteIcon').src = currentScan.icon;
            document.getElementById('sitePR').innerText = currentScan.pr;
            document.getElementById('previewCard').classList.remove('hidden');
            document.getElementById('btnSpinner').classList.add('hidden');
        };

        window.confirmSubmission = async function() {
            await addDoc(collection(db, "league_sites"), currentScan);
            document.getElementById('previewCard').classList.add('hidden');
            loadIndex();
        };

        // --- UI & Data ---
        async function fetchAffiliateData() {
            const docSnap = await getDoc(doc(db, "app_settings", "ads"));
            if (docSnap.exists()) affiliateLink = docSnap.data().aliexpress_url;
        }

        window.safeAffiliateRedirect = () => { if (affiliateLink) window.open(affiliateLink, '_blank'); };

        window.loadIndex = async function() {
            await fetchAffiliateData();
            const q = query(collection(db, "league_sites"), orderBy("votes", "desc"), limit(100));
            const snap = await getDocs(q);
            renderTable(snap.docs.map(d => ({ id: d.id, ...d.data() })));
        };

        function renderTable(data) {
            const tbody = document.getElementById('leaderboardBody');
            let html = '';
            data.forEach((item, i) => {
                html += `
                    <tr class="hover:bg-white/[0.02] transition-colors group">
                        <td class="p-4 md:p-8 font-black text-2xl md:text-4xl opacity-10 italic">${i + 1}</td>
                        <td class="p-4 md:p-8">
                            <div class="flex items-center gap-4">
                                <img src="${item.icon}" class="w-10 h-10 md:w-14 md:h-14 rounded-xl bg-black border border-white/10 p-1">
                                <div>
                                    <div class="font-bold text-white text-sm md:text-xl tracking-tighter">${item.title}</div>
                                    <div class="text-[9px] text-indigo-400 font-black uppercase italic">PR ${item.pr}</div>
                                </div>
                            </div>
                        </td>
                        <td class="p-8 hide-mobile">
                            <div class="flex flex-wrap gap-1 max-w-[150px]">
                                ${Object.keys(item.metrics || {}).slice(0, 3).map(k => `<span class="text-[7px] font-black px-1.5 py-0.5 rounded bg-white/5 text-slate-500 uppercase border border-white/5">${k}</span>`).join('')}
                            </div>
                        </td>
                        <td class="p-4 md:p-8 text-center font-black text-xl md:text-4xl italic text-white">${item.votes}</td>
                        <td class="p-4 md:p-8 text-right">
                            <div class="flex items-center justify-end gap-3">
                                <button onclick="openShare('${item.id}', '${item.title.replace(/'/g, "\\'")}', '${item.pr}')" class="bg-indigo-600/10 text-indigo-400 px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest">Embed</button>
                                <button onclick="vote('${item.id}')" class="bg-orange-500 text-white px-6 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest shadow-lg shadow-orange-500/20">Vote</button>
                            </div>
                        </td>
                    </tr>`;

                if ((i + 1) % 10 === 0) {
                    html += `<tr><td colspan="5" class="p-0 border-y border-white/5"><div class="ad-container group" onclick="safeAffiliateRedirect()"><div class="ad-blur-bg" style="background-image: url('${adImageUrl}')"></div><div class="ad-content"><span class="text-[8px] font-black text-white bg-indigo-600 px-2 py-0.5 rounded uppercase">Sponsored</span><img src="${adImageUrl}" class="h-full py-1 object-contain group-hover:scale-110 transition-transform"><div class="bg-white text-black px-4 py-1.5 rounded-full font-black text-[9px] uppercase">Get Deal</div></div></div></td></tr>`;
                }
            });
            tbody.innerHTML = html;
        }

        window.openShare = (id, title, pr) => {
            const badge = `<div style="display:inline-flex; align-items:center; background:#05070a; border:1px solid #312e81; border-radius:12px; padding:12px 20px; font-family:sans-serif; color:white;"><div style="font-weight:900; font-style:italic; margin-right:12px;">pcs365</div><div style="font-size:10px; opacity:0.6; margin-right:8px;">${title}</div><div style="font-weight:900; color:#818cf8;">PR ${pr}</div></div>`;
            document.getElementById('modalTitle').innerText = `${title} Badge`;
            document.getElementById('badgePreview').innerHTML = badge;
            document.getElementById('badgeCode').innerText = badge;
            document.getElementById('badgeModal').classList.add('active');
        };
        window.closeModal = () => document.getElementById('badgeModal').classList.remove('active');
        window.copyBadgeCode = () => { navigator.clipboard.writeText(document.getElementById('badgeCode').innerText); alert("Copied!"); };

        loadIndex();
    </script>
</body>
</html>
